<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM App Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================
           Global Base & Reset
           ========================================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-primary-light: #eff6ff;
            --color-secondary: #f59e0b;
            --color-bg-app: #f8fafc;
            --color-text-main: #1f2937;

            /* Global Background Variables (สามารถ Override ผ่าน JS ได้) */
            --theme-bg-color: var(--color-bg-app);
            --theme-bg-image: none;
        }

        body {
            font-family: 'Prompt', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            background-color: #f3f4f6;
            /* พื้นหลังของเว็บเบราว์เซอร์กรณีจอกว้าง */
            display: flex;
            justify-content: center;
            color: var(--color-text-main);
        }

        img,
        svg {
            display: block;
            max-width: 100%;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
            outline: none;
            border: none;
            background: transparent;
        }

        button {
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ==========================================
           Index Hub Styles
           ========================================== */
        .app-root-container {
            width: 100%;
            max-width: 28rem;
            position: relative;
            min-height: 100vh;
            height: 100dvh;
            background-color: transparent;
            /* ให้โปร่งใสเพื่อโชว์ global-bg-layer */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .layer-base {
            position: absolute;
            inset: 0;
        }

        /* Global Background Layer (ล่างสุด) */
        .global-bg-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: var(--theme-bg-color);
            background-image: var(--theme-bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* กันไม่ให้ภาพเลื่อนตอน Scroll */
            pointer-events: none;
            /* กันการกดโดน */
            transition: background 0.3s ease;
        }

        .layer-10 {
            z-index: 10;
        }

        .layer-30 {
            z-index: 30;
            pointer-events: none;
        }

        .layer-50 {
            z-index: 50;
            pointer-events: none;
        }

        /* Global Loading */
        .global-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .global-loading-overlay.hidden-fade {
            opacity: 0;
            pointer-events: none;
        }

        .loading-circle-wrapper {
            position: relative;
            width: 5rem;
            height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 9999px;
            background-color: #ffffff;
            border: 1px solid #f9fafb;
        }

        .loading-ring-bg {
            position: absolute;
            inset: 0;
            border: 4px solid #f3f4f6;
            border-radius: 9999px;
        }

        .loading-ring-spin {
            position: absolute;
            inset: 0;
            border: 4px solid var(--color-primary);
            border-radius: 9999px;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        .loading-icon-center {
            width: 3rem;
            height: 3rem;
            background-color: var(--color-primary-light);
            color: var(--color-primary);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            z-index: 2;
            font-size: 1.25rem;
        }

        .loading-text {
            font-size: 0.875rem;
            font-weight: 700;
            color: #1f2937;
            letter-spacing: 0.05em;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .hidden {
            display: none !important;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>

    <script>
        window.APP_VERSION = String(sessionStorage.getItem('VERSION') || Date.now());
        console.log(`VERSION = ${APP_VERSION}`);
        // ปรับ style.css (ถ้ามีของเดิมหลงเหลือ) ให้โหลดเข้ามาร่วมด้วย
        const cssLink = document.createElement('link');
        cssLink.rel = 'stylesheet';
        cssLink.href = `res/style.css?v=${APP_VERSION}`;
        document.head.appendChild(cssLink);
    </script>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
</head>

<body>
    <!-- Roots Container: ควบคุมความกว้างให้อยู่ตรงกลางบนจอใหญ่ -->
    <div class="app-root-container">

        <!-- [Background] Layer ล่างสุดที่ทำหน้าที่เป็นพื้นหลังของทั้งแอป -->
        <div id="global-bg-layer" class="global-bg-layer"></div>

        <!-- [console] & [page] & [iframe] Layer Root -->
        <div id="app-layout-root" class="layer-base layer-10"></div>

        <!-- Login Overlay Layer -->
        <div id="login-overlay-root" class="layer-base layer-30"></div>

        <!-- [popup] Layer Root -->
        <div id="system-overlay-root" class="layer-base layer-50"></div>

    </div>

    <!-- [loading] Layer กลางของระบบ (Top Most) -->
    <div id="global-loading-overlay" class="global-loading-overlay">
        <div class="loading-circle-wrapper">
            <div class="loading-ring-bg"></div>
            <div class="loading-ring-spin"></div>
            <div class="loading-icon-center">
                <i class="fa-solid fa-rocket"></i>
            </div>
        </div>
        <span id="global-loading-text" class="loading-text">Initializing System...</span>
    </div>

    <script>
        // 1. ศูนย์กลางการ Boot ระบบ (Hub)
        async function bootstrap() {
            try {
                console.log("⚡ Starting Parallel Boot...");

                window.crmDB = await openHTMLCacheDB(APP_VERSION);
                console.log("ระบบ Cache พร้อมใช้งาน!");

                const scripts = [
                    "res/appApi.js",
                    "res/crmApi.js",
                    "res/pageManager.js",
                    "res/utility.js"
                ];

                const fetchPromises = [];

                // 1. Preload Scripts
                const loadScriptsPromise = Promise.all(scripts.map(src => {
                    return new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = `${src}?v=${APP_VERSION}`;
                        s.async = false;
                        s.onload = resolve;
                        s.onerror = reject;
                        document.head.appendChild(s);
                    });
                }));
                fetchPromises.push(loadScriptsPromise);


                // 2. Preload Config.json
                fetchPromises.push(
                    fetchPage(`res/config.json`, APP_VERSION)
                        .then(res => res)
                );

                // 3. Preload Console Layout (แค่โหลด text มาไว้)
                let preloadedLayoutHtml = "";
                fetchPromises.push(
                    fetchPage(`page/system/console.html`, APP_VERSION)
                        .then(html => preloadedLayoutHtml = html)
                        .catch(err => console.error("Failed to preload console:", err))
                );

                // 4. Preload System Page (แค่โหลด text มาไว้)
                let preloadedSystemHtml = "";
                fetchPromises.push(
                    fetchPage(`page/system/systempage.html`, APP_VERSION)
                        .then(html => preloadedSystemHtml = html)
                        .catch(err => console.error("Failed to preload system page:", err))
                );

                // โหลด Scripts และ Config มาก่อน
                const [_, config] = await Promise.all(fetchPromises);
                console.log(config);
                window.appConfig = JSON.parse(config);

                // โหลด HTML text ขนานไปกับการทำงานอื่นๆ (Preload Layout, System, Main Pages แบบ Parallel)
                PageManager.setupRoutes(appConfig, preloadedLayoutHtml, preloadedSystemHtml);

                // ตรวจสอบข้อมูลผู้ใช้/App ID
                const gameId = await Utility.checkAppId();
                if (!gameId) {
                    PageManager.hideLoading();
                    return;
                }

                const setupconfig = {
                    URL: appConfig.server.SERVERURL,
                    AppId: appConfig.server.APPID,
                    ApiKey: appConfig.server.KEY,
                    GameBundle: appConfig.server.BUNDLEID,
                    GameConfigId: gameId
                };
                AppApi.init(setupconfig);
                await CrmApi.init();

                console.log("🚀 Booting Main Console & Overlay Completed...");

                // เริ่มระบบเสร็จสิ้น ปิดหน้าจอ Loading
                PageManager.hideLoading();

            } catch (error) {
                console.error("Bootstrap Error:", error);
                const loadingText = document.getElementById('global-loading-text');
                if (loadingText) {
                    loadingText.innerHTML = `<span style="color:#ef4444;">Failed to load application.<br><span style="font-size:0.75rem; font-weight:400; color:#6b7280;">${error.message}</span></span>`;
                    document.querySelector('.loading-ring-spin')?.classList.add('hidden');
                }
            }
        }

        bootstrap();







        //## IndexedDB ##
        // 1. ฟังก์ชันเปิดฐานข้อมูล และล้างข้อมูลทันทีหาก APP_VERSION เปลี่ยน
        let db;
        function openHTMLCacheDB(APP_VERSION) {
            return new Promise((resolve, reject) => {
                const dbName = 'CRM_Page_Cache_DB';
                const request = indexedDB.open(dbName);

                request.onsuccess = (e) => {
                    const db = e.target.result;

                    // อ่านเวอร์ชันที่เคยบันทึกไว้ในเครื่องผู้ใช้มาเทียบกับเวอร์ชันปัจจุบัน
                    const savedVersion = localStorage.getItem('CRM_DB_APP_VERSION');

                    if (savedVersion !== APP_VERSION) {
                        // ⚠️ เวอร์ชันเปลี่ยน! ทำการล้างข้อมูลทั้งหมดในเครื่องทันที
                        db.close(); // ปิดการเชื่อมต่อปัจจุบันก่อน

                        // ใช้คำสั่งลบฐานข้อมูลทิ้งทั้งก้อน เพื่อความสะอาดและรวดเร็ว
                        const deleteRequest = indexedDB.deleteDatabase(dbName);

                        deleteRequest.onsuccess = () => {
                            console.log(`[Cache] ลบ Cache เวอร์ชันเก่า (${savedVersion}) สำเร็จ`);
                            // บันทึกเวอร์ชันใหม่ลง LocalStorage
                            localStorage.setItem('CRM_DB_APP_VERSION', APP_VERSION);

                            // เปิดฐานข้อมูลใหม่อีกครั้งเพื่อสร้างตารางเปล่าๆ สำหรับเวอร์ชันใหม่
                            openHTMLCacheDB(APP_VERSION).then(resolve).catch(reject);
                        };

                        deleteRequest.onerror = () => reject(deleteRequest.error);
                        return;
                    }

                    resolve(db);
                };

                // ส่วนนี้จะทำงานเฉพาะตอนที่สร้างฐานข้อมูลครั้งแรก หรือหลังจากถูกลบไป
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('pages')) {
                        db.createObjectStore('pages', { keyPath: 'pageKey' });
                        // บันทึกเวอร์ชันปัจจุบันลง LocalStorage ไว้เป็นหลักฐาน
                        localStorage.setItem('CRM_DB_APP_VERSION', APP_VERSION);
                        console.log(`[Cache] สร้างฐานข้อมูลรองรับเวอร์ชัน ${APP_VERSION} เรียเร็จ`);
                    }
                };

                request.onerror = (e) => reject(e.target.error);
            });
        }
        // 2. ฟังก์ชันดึงและบันทึกข้อมูล (นำไปแทนที่โค้ดเดิมของคุณ)
        // ผูกฟังก์ชันไว้กับ window เพื่อให้เข้าถึงได้จากทุกที่
        window.fetchPage = async function (url, APP_VERSION) {
            try {
                const db = window.crmDB;
                if (!db) throw new Error("crmDB is not initialized");

                // ... (โค้ดภายในทั้งหมดคงเดิมเหมือนที่คุณเขียนไว้) ...
                const cachedData = await new Promise((resolve) => {
                    const transaction = db.transaction('pages', 'readonly');
                    const store = transaction.objectStore('pages');
                    const request = store.get(url);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                });

                if (cachedData && cachedData.version === APP_VERSION) {
                    return cachedData.html;
                }
                const res = await fetch(`${url}?v=${APP_VERSION}`);
                if (res.ok) {
                    const html = await res.text();
                    const saveTransaction = db.transaction('pages', 'readwrite');
                    const saveStore = saveTransaction.objectStore('pages');
                    saveStore.put({
                        pageKey: url,
                        version: APP_VERSION,
                        html: html,
                        updatedAt: Date.now()
                    });
                    return html;
                }
                return null;

            } catch (error) {
                console.error("IndexedDB Cache Error:", error);
                try {
                    const res = await fetch(`${url}?v=${APP_VERSION}`);
                    if (res.ok) return await res.text();
                } catch (e) { }
                return null;
            }
        };

    </script>
</body>

</html>
