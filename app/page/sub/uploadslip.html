                    clearAll: "ลบทั้งหมด",
                    submitBtn: "ส่งข้อมูลใบเสร็จ",
                    historyBtnText: "ดูประวัติการอัปโหลด",
                    historyTitle: "ประวัติการอัปโหลด",
                    historyEmpty: "ยังไม่มีประวัติการอัปโหลด",
                    historyLoading: "กำลังโหลดข้อมูล...",
                    status_completed: "สำเร็จ",
                    status_pending: "รอตรวจสอบ",
                    status_processing: "กำลังตรวจสอบ",
                    status_duplicate: "ซ้ำ",
                    status_rejected: "ไม่อนุมัติ",
                    msgLoadingUpload: "กำลังอัปโหลดข้อมูล...",
                    msgLoadingCheck: "กำลังตรวจสอบใบเสร็จ...",
                    successTitle: "อัปโหลดสำเร็จ!",
                    successDesc: "ระบบตรวจสอบข้อมูลเรียบร้อยแล้ว",
                    successAmount: "ยอดเงินที่ตรวจสอบ",
                    successPoints: "คะแนนที่ได้รับ",
                    successPointsUnit: "คะแนน",
                    reviewTitle: "ได้รับข้อมูลแล้ว",
                    reviewDesc1: "ระบบกำลังรอการอนุมัติ",
                    reviewDesc2: "คะแนนจะถูกโอนเข้าบัญชีของคุณอัตโนมัติ<br>เมื่อเจ้าหน้าที่ทำการตรวจสอบเสร็จสิ้น",
                    reviewNoticeTitle: "ใช้เวลาดำเนินการ 1-2 วัน",
                    errorTitle: "เกิดข้อผิดพลาด",
                    errorDesc: "ไม่สามารถทำรายการได้ในขณะนี้",
                    duplicateTitle: "ใบเสร็จซ้ำ",
                    duplicateDesc: "ใบเสร็จนี้ถูกสแกนใช้งานไปแล้ว",
                    msgPending: "อัปโหลดสำเร็จ ระบบกำลังรอการตรวจสอบ",
                    msgDuplicate: "ใบเสร็จนี้ถูกใช้งานไปแล้ว",
                    msgError: "เกิดข้อผิดพลาด กรุณาลองใหม่",
                    btnOk: "ตกลง",
                    historyOrderRef: "อ้างอิง:"
                },
                En: {
                    pageTitle: "Submit Receipt",
                    pageDesc: "Please attach clear photos of your receipt.",
                    uploadMain: "Click to select or take a photo",
                    uploadSub: "Multiple photos supported",
                    previewTitle: "Selected Images",
                    clearAll: "Clear All",
                    submitBtn: "Submit Receipt",
                    historyBtnText: "View Upload History",
                    historyTitle: "Upload History",
                    historyEmpty: "No upload history yet.",
                    historyLoading: "Loading data...",
                    status_completed: "Completed",
                    status_pending: "Pending",
                    status_processing: "Processing",
                    status_duplicate: "Duplicate",
                    status_rejected: "Rejected",
                    msgLoadingUpload: "Uploading data...",
                    msgLoadingCheck: "Verifying receipt...",
                    successTitle: "Upload Successful!",
                    successDesc: "System has verified the data.",
                    successAmount: "Verified Amount",
                    successPoints: "Points Earned",
                    successPointsUnit: "pts",
                    reviewTitle: "Data Received",
                    reviewDesc1: "Awaiting approval",
                    reviewDesc2: "Points will be automatically transferred<br>once the review is complete.",
                    reviewNoticeTitle: "Processing takes 1-2 days",
                    errorTitle: "Error Occurred",
                    errorDesc: "Cannot process the request at this time.",
                    duplicateTitle: "Duplicate Receipt",
                    duplicateDesc: "This receipt has already been used.",
                    msgPending: "Uploaded successfully, awaiting review.",
                    msgDuplicate: "This receipt has already been used.",
                    msgError: "An error occurred, please try again.",
                    btnOk: "OK",
                    historyOrderRef: "Ref:"
                }
            };

            // ==========================================
            // 2. STATE VARIABLES
            // ==========================================
            let currentLang = 'Th';
            let selectedFiles = [];
            let pollingInterval = null;
            let pointsAutoApprove = false;
            let currentResultData = null;
            let currentSuccessStatus = false;

            // Elements
            const elFileInput = document.getElementById('us-file-input');
            const elPreviewCont = document.getElementById('us-preview-container');
            const elPreviewGrid = document.getElementById('us-preview-grid');
            const elFileCount = document.getElementById('us-file-count');
            const elBtnClear = document.getElementById('us-btn-clear');
            const elBtnSubmit = document.getElementById('us-btn-submit');
            const elBtnHistory = document.getElementById('us-btn-history');
            const elHistModal = document.getElementById('us-history-modal');
            const elHistClose = document.getElementById('us-hist-close');
            const elHistBody = document.getElementById('us-hist-body');
            const elResultModal = document.getElementById('resultModal');
            const elResultCloseBtn = document.getElementById('resultCloseBtn');

            // ==========================================
            // 3. CORE FUNCTIONS
            // ==========================================
            function init() {
                // Set Language
                if (window.crmData && window.crmData.language === 'En') currentLang = 'En';
                applyLanguage();
                applyTheme();

                // Set Header Image
                const headerImg = document.getElementById('us-header-img');
                if (window.Utility && typeof Utility.getAssetPath === 'function') {
                    const imgPath = Utility.getAssetPath('uploadHeader');
                    if (imgPath) headerImg.src = imgPath;
                } else if (window.appData?.customAssets?.uploadHeader) {
                    headerImg.src = window.appData.customAssets.uploadHeader;
                }

                // Bind Events
                elFileInput.addEventListener('change', handleFileSelect);
                elBtnClear.addEventListener('click', clearFiles);
                elBtnSubmit.addEventListener('click', handleSubmit);
                elBtnHistory.addEventListener('click', openHistory);
                elHistClose.addEventListener('click', () => elHistModal.classList.remove('show'));

                // Result Modal Close Event
                elResultCloseBtn.addEventListener('click', () => {
                    elResultModal.classList.remove('show');
                    clearFiles();
                });
            }

            // --- Color Helper ---
            function getContrastYIQ(hexcolor) {
                if (!hexcolor) return '#ffffff';
                hexcolor = hexcolor.replace("#", "");
                if (hexcolor.length === 3) {
                    hexcolor = hexcolor.split('').map(char => char + char).join('');
                }
                const r = parseInt(hexcolor.substr(0, 2), 16);
                const g = parseInt(hexcolor.substr(2, 2), 16);
                const b = parseInt(hexcolor.substr(4, 2), 16);
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                return (yiq >= 128) ? '#1e293b' : '#ffffff';
            }

            function hexToRgb(hex) {
                let h = hex.replace("#", "");
                if (h.length === 3) h = h.split('').map(c => c + c).join('');
                return `${parseInt(h.substr(0, 2), 16)}, ${parseInt(h.substr(2, 2), 16)}, ${parseInt(h.substr(4, 2), 16)}`;
            }

            function applyTheme() {
                const pColor = window.appData?.primaryColor || '#2563eb';
                const pText = getContrastYIQ(pColor);

                let pRgb = '37, 99, 235';
                try { pRgb = hexToRgb(pColor); } catch (e) { }

                let styleTag = document.getElementById('dynamic-theme');
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = 'dynamic-theme';
                    document.head.appendChild(styleTag);
                }

                styleTag.innerHTML = `
                .us-btn-submit:not(:disabled) { background-color: ${pColor}; color: ${pText}; }
                .us-btn-submit:not(:disabled):hover { box-shadow: 0 6px 20px rgba(${pRgb}, 0.23); opacity: 0.95; }
                .us-dropzone:hover { border-color: ${pColor}; background-color: rgba(${pRgb}, 0.04); }
                .us-dropzone:hover .us-dropzone-icon { color: ${pColor}; }
                .us-dropzone-icon { color: ${pColor}; }
                #us-file-count { color: ${pColor}; }
                .us-preview-title svg { color: ${pColor}; }
                .us-btn-history:hover { color: ${pColor}; }
                .us-hist-icon-box { background-color: rgba(${pRgb}, 0.1); color: ${pColor}; }
                .us-badge.processing { background-color: rgba(${pRgb}, 0.1); color: ${pColor}; border: 1px solid rgba(${pRgb}, 0.3); }
            `;
            }

            function applyLanguage() {
                const dict = i18n[currentLang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) el.innerHTML = dict[key];
                });
            }

            // --- File Handling ---
            function handleFileSelect(e) {
                const files = Array.from(e.target.files);
                selectedFiles = [...selectedFiles, ...files];
                renderPreview();
            }

            function clearFiles() {
                selectedFiles = [];
                elFileInput.value = '';
                renderPreview();
            }

            function removeFile(index) {
                selectedFiles.splice(index, 1);
                renderPreview();
            }

            function renderPreview() {
                elPreviewGrid.innerHTML = '';
                elFileCount.textContent = selectedFiles.length;

                if (selectedFiles.length > 0) {
                    elPreviewCont.classList.remove('us-hidden');
                    elBtnSubmit.disabled = false;

                    selectedFiles.forEach((file, index) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const div = document.createElement('div');
                            div.className = 'us-preview-item';
                            div.innerHTML = `
                            <img src="${e.target.result}" alt="Preview">
                            <button class="us-btn-remove" onclick="window.UploadSlipCtrl.remove(${index})">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        `;
                            elPreviewGrid.appendChild(div);
                        };
                        reader.readAsDataURL(file);
                    });
                } else {
                    elPreviewCont.classList.add('us-hidden');
                    elBtnSubmit.disabled = true;
                }
            }

            // --- Submit & API Flow ---
            async function handleSubmit() {
                if (!window.CrmApi || typeof window.CrmApi.onUploadReceiptImage !== 'function') {
                    if (window.PageManager) PageManager.showToast("System Error: CrmApi.onUploadReceiptImage not found", "❌");
                    return;
                }

                const dict = i18n[currentLang];
                if (window.PageManager) PageManager.showLoading(dict.msgLoadingUpload);

                try {
                    // เรียกใช้งาน API กลาง
                    const data = await window.CrmApi.onUploadReceiptImage(selectedFiles);

                    if (data) {
                        pointsAutoApprove = data.pointsAutoApprove === true;
                        // Success -> มีข้อมูล Data กลับมา
                        if (pointsAutoApprove) {
                            startPolling(data.jobId, data.ida);
                        } else {
                            // ปิด Loading และเปิดหน้าจอ Pending แบบ Custom 
                            if (window.PageManager) PageManager.hideLoading();
                            finishProcess(data, true);
                        }
                    } else {
                        // Failed
                        throw new Error('Upload failed or returned null');
                    }
                } catch (error) {
                    if (window.PageManager) PageManager.hideLoading();
                    finishProcess({ error: error.message || dict.msgError }, false);
                    console.error("Upload Error:", error);
                }
            }

            function startPolling(jobId, ida) {
                const dict = i18n[currentLang];
                if (window.PageManager) PageManager.showLoading(dict.msgLoadingCheck);

                let attempts = 0;
                const maxAttempts = 15; // ประมาณ 45 วินาที

                const poll = async () => {
                    attempts++;
                    try {
                        if (!window.CrmApi || typeof window.CrmApi.onCheckOCR !== 'function') {
                            throw new Error("CrmApi.onCheckOCR not found");
                        }

                        // เรียกใช้ API เช็คสถานะ
                        const data = await window.CrmApi.onCheckOCR(jobId, ida);

                        if (!data) throw new Error("Polling returned null");

                        const status = data?.job?.status || data?.jobs?.[0]?.status;

                        if (status === 'completed') {
                            if (window.PageManager) PageManager.hideLoading();
                            finishProcess(data, true);
                        } else if (status === 'duplicate') {
                            if (window.PageManager) PageManager.hideLoading();
                            data.isDuplicate = true;
                            finishProcess(data, false);
                        } else if (status === 'pending_review' || status === 'processing') {
                            if (attempts >= maxAttempts) {
                                // Timeout fallback เปลี่ยนไปแสดงหน้าจอรอดำเนินการ
                                if (window.PageManager) PageManager.hideLoading();
                                pointsAutoApprove = false;
                                finishProcess(data, true);
                            } else {
                                if (window.PageManager) PageManager.showLoading(dict.msgLoadingCheck);
                                pollingInterval = setTimeout(poll, 3000);
                            }
                        } else {
                            // Rejected or Error
                            if (window.PageManager) PageManager.hideLoading();
                            finishProcess(data, false);
                        }
                    } catch (err) {
                        if (window.PageManager) PageManager.hideLoading();
                        finishProcess({ error: err.message || dict.msgError }, false);
                    }
                };
                poll();
            }

            // --- Final Process Output (Custom Result Modal) ---
            function finishProcess(data, success = true) {
                currentResultData = data;
                currentSuccessStatus = success;

                const dict = i18n[currentLang];
                const resultTitle = document.getElementById('resultTitle');
                const resultBody = document.getElementById('resultBody');
                const resultStatusIcon = document.getElementById('resultStatusIcon');
                const resultCloseBtn = document.getElementById('resultCloseBtn');

                resultBody.innerHTML = '';
                resultCloseBtn.textContent = dict.btnOk;

                // Set Color Themes
                const primaryColor = window.appData?.primaryColor || '#2563eb';
                const primaryTextColor = getContrastYIQ(primaryColor);

                let pRgb = '37, 99, 235';
                try { pRgb = hexToRgb(primaryColor); } catch (e) { }

                if (success) {
                    if (pointsAutoApprove) {
                        // Success View (Green / Emerald)
                        resultStatusIcon.innerHTML = `
                        <div class="res-icon-wrapper">
                            <div class="res-icon-ping"></div>
                            <div class="res-icon-circle">
                                <i class="fa-solid fa-check"></i>
                            </div>
                        </div>
                    `;
                        resultTitle.textContent = dict.successTitle;
                        resultTitle.style.color = '#059669';

                        const totalAmount = data?.job?.order?.totalAmount || data?.order?.totalAmount || "0.00";
                        const pointsEarned = data?.job?.order?.pointsEarned || data?.order?.pointsEarned || 0;

                        resultBody.innerHTML = `
                        <p style="color:#64748b; font-size:0.875rem; margin-bottom:1.25rem; text-align:center;">${dict.successDesc}</p>
                        <div class="res-box-success">
                            <div class="res-box-row">
                                <span class="res-box-label">${dict.successAmount}</span>
                                <span class="res-box-val">฿${parseFloat(totalAmount).toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                            </div>
                            <div class="res-box-divider"></div>
                            <div class="res-box-row">
                                <span class="res-box-label">${dict.successPoints}</span>
                                <div class="res-box-badge">
                                    + ${pointsEarned} <span style="font-size:0.75rem; margin-left:0.125rem;">${dict.successPointsUnit}</span>
                                </div>
                            </div>
                        </div>
                    `;
                        resultCloseBtn.style.backgroundColor = primaryColor;
                        resultCloseBtn.style.color = primaryTextColor;
                    } else {
                        // Pending View (Theme Colors)
                        resultStatusIcon.innerHTML = `
                        <div class="res-icon-wrapper">
                            <div class="res-icon-pulse" style="background-color: ${primaryColor};"></div>
                            <div class="res-icon-circle-pending" style="background-color: rgba(${pRgb}, 0.1); color: ${primaryColor};">
                                <i class="fa-solid fa-hourglass-half"></i>
                            </div>
                        </div>
                    `;
                        resultTitle.textContent = dict.reviewTitle;
                        resultTitle.style.color = primaryColor;

                        resultBody.innerHTML = `
                        <div class="res-box-pending" style="background-color: rgba(${pRgb}, 0.05); border-color: rgba(${pRgb}, 0.2);">
                            <p class="res-pending-text1">${dict.reviewDesc1}</p>
                            <p class="res-pending-text2">${dict.reviewDesc2}</p>
                        </div>
                        <div class="res-box-highlight">
                            <i class="fa-solid fa-circle-exclamation res-highlight-icon"></i>
                            <p class="res-highlight-text">
                                ${dict.reviewNoticeTitle}
                            </p>
                        </div>
                    `;
                        resultCloseBtn.style.backgroundColor = primaryColor;
                        resultCloseBtn.style.color = primaryTextColor;
                    }
                } else {
                    // Failed View (Red / Rose)
                    resultStatusIcon.innerHTML = `
                    <div class="res-icon-wrapper">
                        <div class="res-icon-circle-error">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                    </div>
                `;

                    if (data?.isDuplicate) {
                        resultTitle.textContent = dict.duplicateTitle;
                        resultTitle.style.color = '#e11d48';
                        resultBody.innerHTML = `
                        <p class="res-error-desc">${dict.duplicateDesc}</p>
                    `;
                    } else {
                        resultTitle.textContent = dict.errorTitle;
                        resultTitle.style.color = '#1e293b';
                        resultBody.innerHTML = `
                        <p class="res-error-desc">${dict.errorDesc}</p>
                        <div class="res-box-error">
                            <p class="res-error-msg">${data?.error || data?.remark || data?.message || 'Unknown Error'}</p>
                        </div>
                    `;
                    }

                    resultCloseBtn.style.backgroundColor = '#1e293b';
                    resultCloseBtn.style.color = '#ffffff';
                }

                elResultModal.classList.add('show');
            }

            // --- History ---
            async function openHistory() {
                elHistModal.classList.add('show');
                const dict = i18n[currentLang];

                elHistBody.innerHTML = `
                <div class="us-hist-loading">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                    <p>${dict.historyLoading}</p>
                </div>
            `;

                try {
                    if (!window.CrmApi || typeof window.CrmApi.onCheckOCR !== 'function') {
                        throw new Error("CrmApi.onCheckOCR not found");
                    }

                    // เรียก API ดึง History โดยไม่ส่ง Parameter (ดึงทั้งหมด 30 รายการตาม Default)
                    const data = await window.CrmApi.onCheckOCR();

                    if (!data) {
                        throw new Error("No data returned from API");
                    }

                    const jobs = data?.jobs || data?.job || [];
                    renderHistory(jobs);

                } catch (error) {
                    elHistBody.innerHTML = `<div class="us-hist-empty" style="color:#ef4444;">${dict.msgError}</div>`;
                }
            }

            function getStatusStyle(status) {
                const s = status ? status.toLowerCase() : '';
                const dict = i18n[currentLang];
                if (s === 'completed') return { text: dict.status_completed, class: 'completed' };
                if (s === 'pending_review') return { text: dict.status_pending, class: 'pending' };
                if (s === 'processing') return { text: dict.status_processing, class: 'processing' };
                if (s === 'duplicate') return { text: dict.status_duplicate, class: 'rejected' };
                if (s === 'rejected') return { text: dict.status_rejected, class: 'rejected' };
                return { text: status || 'Unknown', class: 'pending' };
            }

            function renderHistory(jobs) {
                const dict = i18n[currentLang];

                if (!jobs || jobs.length === 0) {
                    elHistBody.innerHTML = `
                    <div class="us-hist-empty">
                        <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.5;"></i>
                        <p style="font-weight: 700; margin:0; color:#334155;">${dict.historyEmpty}</p>
                    </div>
                `;
                    return;
                }

                let html = '';
                jobs.forEach(job => {
                    const style = getStatusStyle(job.status);
                    let dateStr = '';
                    if (job.createdAt) {
                        const d = new Date(job.createdAt);
                        dateStr = `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                    }

                    html += `
                    <div class="us-hist-item">
                        <div class="us-hist-item-top">
                            <div class="us-hist-info">
                                <i class="fa-solid fa-receipt" style="color:#94a3b8;"></i>
                                <span class="us-hist-date">${dateStr}</span>
                            </div>
                            <span class="us-badge ${style.class}">${style.text}</span>
                        </div>
                        <div class="us-hist-id">ID: ${job.jobId || '-'}</div>
                        ${job.orderId ? `<div class="us-hist-ref">${dict.historyOrderRef} <b>${job.orderId}</b></div>` : ''}
                    </div>
                `;
                });

                elHistBody.innerHTML = html;
            }

            // Public API for HTML bindings
            return {
                init,
                remove: removeFile
            };
        })();

        // Initialize when script executes
        window.UploadSlipCtrl.init();
    })();
</script>
