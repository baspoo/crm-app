<style>
    /* ==========================================
       How To Link Marketplace - Scoped Styles (Pure CSS)
       ========================================== */
    .hlm-wrapper {
        width: 100%;
        height: 100%;
        /* ให้เต็ม Modal */
        display: flex;
        flex-direction: column;
        background-color: var(--theme-bg-app, #f8fafc);
        font-family: var(--theme-font, 'Prompt', sans-serif);
        color: var(--theme-text-main, #1e2937);
        overflow: hidden;
        /* จัดการ scroll ภายใน view แทน */
        box-sizing: border-box;
    }

    .hlm-wrapper * {
        box-sizing: border-box;
    }

    /* --- View States --- */
    .hlm-view {
        display: none;
        flex-direction: column;
        height: 100%;
        width: 100%;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .hlm-view.is-active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
    }

    /* ------------------------------------------
       View 1: Selection State
       ------------------------------------------ */
    .hlm-selection-content {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1.5rem;
    }

    .hlm-header-text {
        text-align: center;
        margin: 1.5rem 0 2.5rem 0;
    }

    .hlm-badge {
        display: inline-block;
        padding: 0.375rem 1rem;
        margin-bottom: 1rem;
        background-color: #eff6ff;
        border: 1px solid #dbeafe;
        border-radius: 9999px;
        font-size: 0.625rem;
        font-weight: 700;
        color: #2563eb;
        text-transform: uppercase;
        letter-spacing: 0.2em;
    }

    .hlm-title {
        font-size: 1.5rem;
        font-weight: 800;
        line-height: 1.25;
        margin: 0;
        color: var(--theme-text-main, #1e2937);
    }

    .hlm-title-highlight {
        color: var(--theme-primary, #2563eb);
    }

    .hlm-divider {
        height: 4px;
        width: 3rem;
        background-color: var(--theme-primary, #3b82f6);
        margin: 1.25rem auto;
        border-radius: 9999px;
        opacity: 0.3;
    }

    .hlm-subtitle {
        color: var(--theme-text-muted, #94a3b8);
        font-size: 0.875rem;
        font-weight: 500;
        font-style: italic;
        margin: 0;
    }

    .hlm-grid {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 24rem;
        margin: 0 auto;
        width: 100%;
    }

    /* Platform Cards */
    .hlm-card {
        width: 100%;
        display: flex;
        align-items: center;
        padding: 1.25rem;
        background-color: var(--theme-bg-card, #ffffff);
        border-radius: 1.5rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        border: 1px solid #f1f5f9;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
    }

    .hlm-card:active {
        transform: scale(0.96);
    }

    /* Platform Colors */
    .hlm-card[data-platform="shopee"] {
        border-color: #ffedd5;
        background-color: #fff7ed;
    }

    .hlm-card[data-platform="shopee"]:hover {
        border-color: #fdba74;
    }

    .hlm-card[data-platform="shopee"] .hlm-card-icon {
        background-color: #ffedd5;
    }

    .hlm-card[data-platform="lazada"] {
        border-color: #dbeafe;
        background-color: #eff6ff;
    }

    .hlm-card[data-platform="lazada"]:hover {
        border-color: #93c5fd;
    }

    .hlm-card[data-platform="lazada"] .hlm-card-icon {
        background-color: #dbeafe;
    }

    .hlm-card[data-platform="tiktok"] {
        border-color: #e2e8f0;
        background-color: #f8fafc;
    }

    .hlm-card[data-platform="tiktok"]:hover {
        border-color: #94a3b8;
    }

    .hlm-card[data-platform="tiktok"] .hlm-card-icon {
        background-color: #e2e8f0;
    }

    .hlm-card-icon {
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 1rem;
        transition: transform 0.2s;
    }

    .hlm-card:hover .hlm-card-icon {
        transform: scale(1.1);
    }

    .hlm-card-icon img {
        width: 2rem;
        height: 2rem;
        object-fit: contain;
    }

    .hlm-card-info {
        flex-grow: 1;
    }

    .hlm-card-info h3 {
        font-weight: 700;
        font-size: 1rem;
        margin: 0 0 0.125rem 0;
        line-height: 1.2;
    }

    .hlm-card-info p {
        font-size: 0.625rem;
        font-weight: 500;
        color: var(--theme-text-muted, #94a3b8);
        margin: 0;
    }

    .hlm-card-arrow {
        color: #cbd5e1;
        font-size: 0.75rem;
    }

    .hlm-footer-note {
        text-align: center;
        color: #cbd5e1;
        font-size: 0.625rem;
        font-style: italic;
        margin-top: 2.5rem;
    }

    /* ------------------------------------------
       View 2: Tutorial State
       ------------------------------------------ */
    .hlm-tut-header {
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #f8fafc;
        background-color: var(--theme-bg-card, #ffffff);
        flex-shrink: 0;
    }

    .hlm-btn-back {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: var(--theme-text-muted, #94a3b8);
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 700;
        transition: color 0.2s;
    }

    .hlm-btn-back:hover {
        color: var(--theme-primary, #2563eb);
    }

    .hlm-platform-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .hlm-platform-indicator img {
        width: 1rem;
        height: 1rem;
        object-fit: contain;
    }

    .hlm-platform-indicator span {
        font-size: 0.625rem;
        font-weight: 900;
        color: var(--theme-text-muted, #64748b);
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    /* Progress Bar */
    .hlm-progress-bg {
        height: 4px;
        background-color: #f8fafc;
        width: 100%;
        flex-shrink: 0;
    }

    .hlm-progress-bar {
        height: 100%;
        background-color: var(--theme-primary, #3b82f6);
        width: 0%;
        transition: width 0.5s ease, background-color 0.5s ease;
    }

    /* Image Area */
    .hlm-image-area {
        position: relative;
        flex-grow: 1;
        background-color: #f1f5f9;
        /* slate-100 */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .hlm-main-img {
        height: 100%;
        width: 100%;
        object-fit: contain;
        display: block;
        opacity: 0;
        transform: scale(0.98);
        transition: opacity 0.3s ease-out, transform 0.3s ease-out;
    }

    .hlm-main-img.is-loaded {
        opacity: 1;
        transform: scale(1);
    }

    .hlm-main-img.no-transition {
        transition: none !important;
    }

    /* Loader */
    .hlm-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f1f5f9;
        z-index: 10;
        transition: opacity 0.3s;
    }

    .hlm-spinner {
        border: 3px solid #e2e8f0;
        border-top: 3px solid var(--theme-primary, #3b82f6);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: hlmSpin 1s linear infinite;
    }

    @keyframes hlmSpin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    /* Nav Arrows */
    .hlm-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        border: 1px solid #f1f5f9;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #475569;
        cursor: pointer;
        z-index: 20;
        transition: all 0.2s;
    }

    .hlm-arrow:active {
        transform: translateY(-50%) scale(0.9);
    }

    .hlm-arrow:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        pointer-events: none;
    }

    .hlm-arrow-prev {
        left: 0.5rem;
    }

    .hlm-arrow-next {
        right: 0.5rem;
    }

    /* Description Area */
    .hlm-desc-area {
        padding: 1.5rem;
        text-align: center;
        background-color: var(--theme-bg-card, #ffffff);
        border-top: 1px solid #f8fafc;
        flex-shrink: 0;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .hlm-step-counter {
        font-size: 0.625rem;
        font-weight: 800;
        color: var(--theme-primary, #3b82f6);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-bottom: 0.5rem;
    }

    .hlm-step-desc {
        color: var(--theme-text-main, #334155);
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.6;
        margin: 0;
        padding: 0 1rem;
        transition: opacity 0.3s;
    }

    /* Bottom Action Area (Finish) */
    .hlm-action-area {
        padding: 0.5rem 1.5rem 1.5rem 1.5rem;
        background-color: var(--theme-bg-card, #ffffff);
        flex-shrink: 0;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .hlm-action-area.is-visible {
        visibility: visible;
        opacity: 1;
    }

    .hlm-warning-box {
        margin-bottom: 1rem;
        padding: 0.875rem;
        background-color: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 0.75rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
    }

    .hlm-warning-box i {
        color: #f59e0b;
        margin-top: 0.125rem;
    }

    .hlm-warning-box p {
        color: #b45309;
        font-size: 0.75rem;
        font-weight: 600;
        margin: 0;
        line-height: 1.5;
        text-align: left;
    }

    .hlm-btn-finish {
        width: 100%;
        padding: 1rem;
        background-color: #059669;
        /* emerald-600 */
        color: white;
        border-radius: 1rem;
        font-weight: 800;
        font-size: 0.875rem;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.2);
        transition: all 0.2s;
    }

    .hlm-btn-finish:active {
        transform: scale(0.96);
    }
</style>

<div id="hlm-wrapper" class="hlm-wrapper">

    <!-- ==========================================
         VIEW 1: Selection State
    =========================================== -->
    <div id="hlm-selection" class="hlm-view is-active">
        <div class="hlm-selection-content">
            <div class="hlm-header-text">
                <div class="hlm-badge" data-i18n="userGuide">User Guide</div>
                <h1 class="hlm-title">
                    <span data-i18n="mainTitle1">ขั้นตอนวิธีการหา</span> <br>
                    <span class="hlm-title-highlight" data-i18n="mainTitle2">หมายเลขคำสั่งซื้อ OrderId</span>
                </h1>
                <div class="hlm-divider"></div>
                <p class="hlm-subtitle" data-i18n="subTitle">กรุณาเลือกช่องทางที่คุณสั่งซื้อสินค้าครับ</p>
            </div>

            <div class="hlm-grid" id="hlm-platformGrid">
                <!-- Injected via JS -->
            </div>

            <p class="hlm-footer-note" data-i18n="footerNote">*หากไม่พบหมายเลขคำสั่งซื้อ กรุณาติดต่อแอดมินผ่านช่องแชท
            </p>
        </div>
    </div>

    <!-- ==========================================
         VIEW 2: Tutorial State
    =========================================== -->
    <div id="hlm-tutorial" class="hlm-view bg-white">
        <!-- Header -->
        <div class="hlm-tut-header">
            <button onclick="window.HowToLinkCtrl.backToSelection()" class="hlm-btn-back">
                <i class="fa-solid fa-chevron-left"></i>
                <span data-i18n="backBtn">กลับ</span>
            </button>
            <div class="hlm-platform-indicator">
                <img id="hlm-activePlatformIcon" src="" alt="Platform">
                <span id="hlm-platformTitle">PLATFORM</span>
            </div>
            <div style="width: 2rem;"></div> <!-- Spacer for flex alignment -->
        </div>

        <!-- Progress -->
        <div class="hlm-progress-bg">
            <div id="hlm-progressBar" class="hlm-progress-bar"></div>
        </div>

        <!-- Image Area -->
        <div class="hlm-image-area">
            <div id="hlm-imgLoader" class="hlm-loader">
                <div class="hlm-spinner"></div>
            </div>

            <img id="hlm-currentImg"
                src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                class="hlm-main-img">

            <button onclick="window.HowToLinkCtrl.prevStep()" id="hlm-arrowPrev" class="hlm-arrow hlm-arrow-prev">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button onclick="window.HowToLinkCtrl.nextStep()" id="hlm-arrowNext" class="hlm-arrow hlm-arrow-next">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <!-- Description -->
        <div class="hlm-desc-area">
            <div id="hlm-stepCounter" class="hlm-step-counter">STEP 1 / 3</div>
            <p id="hlm-currentDesc" class="hlm-step-desc" data-i18n="loadingText">กำลังโหลด...</p>
        </div>

        <!-- Action / Finish -->
        <div id="hlm-bottomAction" class="hlm-action-area">
            <div class="hlm-warning-box">
                <i class="fa-solid fa-circle-exclamation"></i>
                <p data-i18n="finalWarning">สะสมคะแนนได้เฉพาะออเดอร์ที่ชำระเงินหรือจัดส่งเรียบร้อยแล้วเท่านั้น</p>
            </div>
            <button onclick="window.HowToLinkCtrl.finishTutorial()" class="hlm-btn-finish">
                <span data-i18n="understoodBtn">เข้าใจแล้ว เริ่มส่งรหัส</span>
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

</div>

<script>
    window.HowToLinkCtrl = (function () {
        // ==========================================
        // 1. DICTIONARY & CONFIG
        // ==========================================
        const i18nDict = {
            Th: {
                userGuide: "User Guide",
                mainTitle1: "ขั้นตอนวิธีการหา",
                mainTitle2: "หมายเลขคำสั่งซื้อ OrderId",
                subTitle: "กรุณาเลือกช่องทางที่คุณสั่งซื้อสินค้าครับ",
                footerNote: "*หากไม่พบหมายเลขคำสั่งซื้อ กรุณาติดต่อแอดมินผ่านช่องแชท",
                backBtn: "กลับ",
                understoodBtn: "เข้าใจแล้ว เริ่มส่งรหัส",
                loadingImg: "ไม่สามารถโหลดรูปภาพได้",
                loadingText: "กำลังโหลด...",
                finalWarning: "สะสมคะแนนได้เฉพาะออเดอร์ที่ชำระเงินหรือจัดส่งเรียบร้อยแล้วเท่านั้น",
                platforms: {
                    shopee: { label: "Shopee", sub: "ช้อปปี้" },
                    lazada: { label: "Lazada", sub: "ลาซาด้า" },
                    tiktok: { label: "TikTok Shop", sub: "ติ๊กต็อก" }
                },
                shopeeDesc: [
                    "เข้าแอป Shopee กดมาที่หน้า “ฉัน”",
                    "แล้วกดไปที่ ปุ่ม “ที่ต้องจัดส่ง”",
                    "เมื่อซื้อของเสร็จ ให้กดไปที่ปุ่ม สินค้าที่สั่งซื้อ",
                    "เลื่อนลงมาที่ “หมายเลขคำสั่งซื้อ” และกดคัดลอกได้เลย"
                ],
                lazadaDesc: [
                    "เมื่อซื้อของเสร็จ ให้กดไปที่ “รายละเอียดคำสั่งซื้อ” ที่อยู่ในกรอบวันที่สินค้าจัดส่ง",
                    "จะเจอหน้า “รายละเอียดคำสั่งซื้อ” เลื่อนลงมาด้านล่าง",
                    "จะพบ “หมายเลขคำสั่งซื้อ” และกดคัดลอกได้เลย"
                ],
                tiktokDesc: [
                    "เปิดแอป “TikTok” และกดที่เมนู Your Orders",
                    "ไปที่เมนู “To review” เพื่อไปที่รายการออเดอร์",
                    "เลื่อนหาสินค้าที่สั่งซื้อกับทางร้าน",
                    "จะเจอหน้ารายละเอียดคำสั่งซื้อ เลื่อนลงมาด้านล่าง",
                    "จะเจอ หมายเลขคำสั่งซื้อ หรือ Order number และกดคัดลอกรหัสได้เลย"
                ]
            },
            En: {
                userGuide: "User Guide",
                mainTitle1: "How to find",
                mainTitle2: "Order ID",
                subTitle: "Please select your purchasing platform",
                footerNote: "*If you cannot find the order ID, please contact the admin via chat.",
                backBtn: "Back",
                understoodBtn: "Understood, Start",
                loadingImg: "Unable to load image",
                loadingText: "Loading...",
                finalWarning: "Points can only be earned from fully paid orders.",
                platforms: {
                    shopee: { label: "Shopee", sub: "Shopee" },
                    lazada: { label: "Lazada", sub: "Lazada" },
                    tiktok: { label: "TikTok Shop", sub: "TikTok" }
                },
                shopeeDesc: [
                    "Open the Shopee app and go to the 'Me' page.",
                    "Tap on 'To Ship' button.",
                    "After purchasing, tap on the ordered item.",
                    "Scroll down to 'Order SN' and tap to copy."
                ],
                lazadaDesc: [
                    "After purchasing, tap 'Order Details' in the delivery date box.",
                    "You will see the 'Order Details' page, scroll down.",
                    "Find 'Order Number' and tap to copy."
                ],
                tiktokDesc: [
                    "Open the 'TikTok' app and go to 'Your Orders'.",
                    "Go to the 'To review' menu to see your order list.",
                    "Scroll to find the item purchased from the store.",
                    "On the order details page, scroll down.",
                    "Find the 'Order number' and tap to copy."
                ]
            }
        };

        const tutorialConfig = {
            platformAssets: {
                shopee: "shopeePlatform",
                lazada: "lazadaPlatform",
                tiktok: "tiktokPlatform"
            },
            tutorials: {
                shopee: [
                    "res/marketplace_tutorials/shopee/img1.png",
                    "res/marketplace_tutorials/shopee/img2.png",
                    "res/marketplace_tutorials/shopee/img3.png",
                    "res/marketplace_tutorials/shopee/img4.png"
                ],
                lazada: [
                    "res/marketplace_tutorials/lazada/img1.png",
                    "res/marketplace_tutorials/lazada/img2.png",
                    "res/marketplace_tutorials/lazada/img3.png"
                ],
                tiktok: [
                    "res/marketplace_tutorials/tiktok/img1.png",
                    "res/marketplace_tutorials/tiktok/img2.png",
                    "res/marketplace_tutorials/tiktok/img3.png",
                    "res/marketplace_tutorials/tiktok/img4.png",
                    "res/marketplace_tutorials/tiktok/img5.png"
                ]
            }
        };

        let responseRef = null;
        let currentLang = 'Th';
        let currentPlatform = '';
        let currentStepIndex = 0;
        let resPathStr = 'page/assets';
        let cacheVer = '';
        const TRANSPARENT_PIXEL = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

        // ==========================================
        // 2. CORE LOGIC
        // ==========================================
        function applyLang() {
            const dict = i18nDict[currentLang] || i18nDict['Th'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerHTML = dict[key];
            });
            renderPlatformSelection();
            if (document.getElementById('hlm-tutorial').classList.contains('is-active')) {
                updateStepUI();
            }
        }

        function getPlatformLogo(platform) {
            let logoUrl = '';
            if (window.Utility && typeof Utility.getAssetPath === 'function') {
                logoUrl = Utility.getAssetPath(tutorialConfig.platformAssets[platform]);
            } else if (window.appData && window.appData.customAssets) {
                // Fallback for older config
                logoUrl = window.appData.customAssets[`${platform}Header`];
            }
            if (!logoUrl) logoUrl = `${resPathStr}/platform/${platform}.png${cacheVer}`;
            return logoUrl;
        }

        function renderPlatformSelection() {
            const grid = document.getElementById('hlm-platformGrid');
            if (!grid) return;
            grid.innerHTML = '';

            const dict = i18nDict[currentLang] || i18nDict['Th'];
            const platforms = ['shopee', 'lazada', 'tiktok'];

            platforms.forEach(p => {
                const label = dict.platforms[p].label;
                const sub = dict.platforms[p].sub;
                const logoUrl = getPlatformLogo(p);

                const btn = document.createElement('div');
                btn.className = 'hlm-card';
                btn.setAttribute('data-platform', p);
                btn.onclick = () => startTutorial(p);
                btn.innerHTML = `
                    <div class="hlm-card-icon">
                        <img src="${logoUrl}" alt="${label}" onerror="this.src='https://via.placeholder.com/64?text=${p}'">
                    </div>
                    <div class="hlm-card-info">
                        <h3>${label}</h3>
                        <p>${sub}</p>
                    </div>
                    <div class="hlm-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
                `;
                grid.appendChild(btn);
            });
        }

        function startTutorial(platform) {
            if (!tutorialConfig.tutorials[platform]) return;
            currentPlatform = platform;
            currentStepIndex = 0;

            document.getElementById('hlm-selection').classList.remove('is-active');
            document.getElementById('hlm-tutorial').classList.add('is-active');

            document.getElementById('hlm-platformTitle').textContent = platform;
            document.getElementById('hlm-activePlatformIcon').src = getPlatformLogo(platform);

            updateStepUI();
        }

        function backToSelection() {
            document.getElementById('hlm-tutorial').classList.remove('is-active');
            document.getElementById('hlm-selection').classList.add('is-active');
        }

        function nextStep() {
            const steps = tutorialConfig.tutorials[currentPlatform];
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                updateStepUI();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateStepUI();
            }
        }

        function onImageLoad() {
            const img = document.getElementById('hlm-currentImg');
            const loader = document.getElementById('hlm-imgLoader');

            if (img.src === TRANSPARENT_PIXEL) return;

            img.classList.remove('no-transition');
            img.classList.add('is-loaded');

            loader.style.opacity = '0';
        }

        function onImageError(img) {
            if (img.src === TRANSPARENT_PIXEL) return;
            const dict = i18nDict[currentLang] || i18nDict['Th'];
            img.src = `https://via.placeholder.com/600x800?text=${encodeURIComponent(dict.loadingImg)}`;
        }

        function updateStepUI() {
            const dict = i18nDict[currentLang] || i18nDict['Th'];
            const stepsPaths = tutorialConfig.tutorials[currentPlatform];
            const stepsDesc = dict[`${currentPlatform}Desc`];

            // Resolve Image Path
            let imgPath = stepsPaths[currentStepIndex];
            if (imgPath.startsWith('res/')) {
                // Map old res/ path to current resPath
                imgPath = imgPath.replace('res/', resPathStr + '/');
            }
            imgPath += cacheVer;

            const stepDesc = stepsDesc[currentStepIndex];
            const isLast = currentStepIndex === stepsPaths.length - 1;

            const img = document.getElementById('hlm-currentImg');
            const desc = document.getElementById('hlm-currentDesc');
            const loader = document.getElementById('hlm-imgLoader');

            // 1. Instant Clear
            img.classList.add('no-transition');
            img.classList.remove('is-loaded');
            img.src = TRANSPARENT_PIXEL;

            // 2. Show Loader
            loader.style.opacity = '1';

            // 3. Text & Progress
            desc.style.opacity = '0';
            document.getElementById('hlm-stepCounter').textContent = `STEP ${currentStepIndex + 1} / ${stepsPaths.length}`;

            // 4. Load New Image
            setTimeout(() => {
                img.src = imgPath;
                img.onload = onImageLoad;
                img.onerror = () => onImageError(img);

                desc.textContent = stepDesc;
                desc.style.opacity = '1';
            }, 50);

            // 5. Buttons
            document.getElementById('hlm-arrowPrev').disabled = (currentStepIndex === 0);
            document.getElementById('hlm-arrowNext').disabled = isLast;

            // 6. Action Area
            const bottomAction = document.getElementById('hlm-bottomAction');
            if (isLast) {
                bottomAction.classList.add('is-visible');
            } else {
                bottomAction.classList.remove('is-visible');
            }

            // 7. Progress Bar
            const progress = ((currentStepIndex + 1) / stepsPaths.length) * 100;
            const bar = document.getElementById('hlm-progressBar');
            bar.style.width = `${progress}%`;
            bar.style.backgroundColor = isLast ? '#10b981' : 'var(--theme-primary, #3b82f6)';
        }

        return {
            init: function (payload, response) {
                responseRef = response;

                if (window.appData && window.appData.resPath) resPathStr = window.appData.resPath;
                if (window.htmlCacheVersion) cacheVer = `?v=${window.htmlCacheVersion}`;

                if (window.crmData && window.crmData.language) {
                    currentLang = window.crmData.language === 'En' ? 'En' : 'Th';
                } else if (window.appData && window.appData.language) {
                    currentLang = window.appData.language === 'En' ? 'En' : 'Th';
                }

                applyLang();

                // สั่งเปิด Tutorial จากภายนอก
                if (payload && payload.platform && tutorialConfig.tutorials[payload.platform]) {
                    startTutorial(payload.platform);
                }
            },

            backToSelection: backToSelection,
            nextStep: nextStep,
            prevStep: prevStep,

            finishTutorial: function () {
                if (responseRef) {
                    responseRef.tutorialPlatform = currentPlatform;
                    responseRef.finished = true;
                    responseRef.status = "ok";
                }

                if (window.PageManager && typeof PageManager.closeModal === 'function') {
                    PageManager.closeModal();
                } else if (window.parent && typeof window.parent.postMessage === 'function') {
                    window.parent.postMessage({
                        type: "formData",
                        data: { tutorialPlatform: currentPlatform, finished: true },
                        closeIframe: true
                    }, "*");
                } else {
                    console.log("Tutorial Finished. Platform: ", currentPlatform);
                }
            }
        };
    })();

    // ==========================================
    // 3. BIND TO PARENT SYSTEM
    // ==========================================
    window.onInit = function (payload, response) {
        window.HowToLinkCtrl.init(payload, response);
    };


</script>
