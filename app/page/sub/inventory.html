        overflow: hidden;
        box-sizing: border-box;
        position: relative;

    .inv-wrapper *,

    .inv-wrapper *::after {
        box-sizing: border-box;
    }

    /* คลาสสำหรับการซ่อน Element (แก้ไขให้เป็น Global) */
    .inv-hidden {
        display: none !important;
    }

    /* --- Header Section --- */
    .inv-header-img {
        width: 100%;
        height: auto;
        max-height: 180px;
        object-fit: cover;
        display: block;
        box-shadow: var(--theme-shadow, 0 4px 6px -1px rgba(0, 0, 0, 0.05));

        border-bottom-right-radius: 1rem;
        background-color: var(--theme-bg-card, #fff);

        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.25rem;
        padding-bottom: 6rem;
        transition: opacity 0.3s ease, transform 0.3s ease;
        -ms-overflow-style: none;
        scrollbar-width: none;

    .inv-view::-webkit-scrollbar {
        display: none;

    .inv-fade-in {
        animation: invFadeIn 0.3s ease-out forwards;

    @keyframes invFadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);

        to {

            transform: translateY(0);

    }

    .inv-btn-primary {
        width: 100%;

        justify-content: center;

    /* ==========================================
       MODAL: CODE DISPLAY
       ========================================== */
    .inv-modal-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(15, 23, 42, 0.8);

        justify-content: flex-end;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;

    .inv-modal-overlay.show {

    }

    .inv-modal-card {

        flex-direction: column;

    .inv-modal-overlay.show .inv-modal-card {
        transform: translateY(0);
    }

        padding: 1.5rem;

        align-items: center;

        padding: 0.6rem;
        font-size: 0.85rem;
        font-weight: 700;
        border-radius: 0.75rem;
        border: none;
        background: transparent;
        color: var(--theme-text-muted, #64748b);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .inv-mode-btn.active {
        background-color: var(--theme-bg-card, #ffffff);

        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

        border-radius: 1.5rem;

        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;

            <div class="inv-mode-switcher">
                <button id="mode-text" class="inv-mode-btn active" onclick="InventoryCtrl.setCodeMode('text')"
                    data-i18n="modeText">ข้อความ</button>
                <button id="mode-qr" class="inv-mode-btn" onclick="InventoryCtrl.setCodeMode('qr')"
                    data-i18n="modeQR">QR Code</button>
                <button id="mode-barcode" class="inv-mode-btn" onclick="InventoryCtrl.setCodeMode('barcode')"
                    data-i18n="modeBarcode">Barcode</button>
            </div>

            <!-- Display Area -->
            <div class="inv-display-box">

                <!-- Text Mode -->
                <div id="disp-text" class=""
                    style="width:100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <p class="inv-code-label" data-i18n="yourCode">Your Code</p>
                    <p id="ui-code-text" class="inv-code-text">--------</p>
                    <button class="inv-btn-copy" onclick="InventoryCtrl.copyToClipboard()">
                        <i class="fa-regular fa-copy"></i>
                        <span data-i18n="copyBtn">คัดลอกรหัส</span>
                    </button>
                </div>

                <!-- QR Mode -->
                <div id="disp-qr" class="inv-hidden"
                    style="width:100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div id="ui-qrcode" class="inv-qr-container"></div>
                    <p class="inv-scan-hint" data-i18n="scanQR">Scan QR Code</p>
                </div>

                <!-- Barcode Mode -->
                <div id="disp-barcode" class="inv-hidden"
                    style="width:100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div class="inv-barcode-container">
                        <svg id="ui-barcode" style="max-width: 100%; height: auto;"></svg>
                    </div>
                    <p class="inv-scan-hint" data-i18n="scanBarcode">Scan Barcode</p>
                </div>

            </div>

            <p class="inv-fallback-hint" data-i18n="scanFallback">หากไม่สามารถสแกนได้ กรุณาใช้รหัสตัวเลขแทน
                หรือปรับความสว่างหน้าจอให้สูงสุด</p>
            <div style="height: 1rem;"></div>
        </div>

    </div>
</div>

<!-- Template: List Item -->
<template id="tpl-inv-item">
    <div class="inv-card">
        <div class="inv-badge-new inv-hidden">NEW!</div>
        <div class="inv-card-img-wrap">
            <img class="inv-card-img slot-img" src="" alt="Item"
                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2VlZSIvPjwvc3ZnPg=='">
        </div>
        <div class="inv-card-info">
            <h3 class="inv-card-title slot-name">Item Name</h3>
            <p class="inv-card-desc slot-desc">Item Description</p>
            <div class="inv-card-used-tag slot-used-tag inv-hidden" data-i18n="statusUsed">ใช้งานแล้ว</div>
        </div>
    </div>
</template>

<script>
    window.InventoryCtrl = (function () {
        'use strict';

        // ==========================================
        // 1. SETTINGS & DICTIONARY
        // ==========================================
        const pageSetting = {
            limit: 20,
            headerAssetKey: 'rewardHeader', // อ้างอิงจาก resPath
            lsKeyViewed: 'crm_inv_viewed_ids',
            newDaysLimit: 7, // ถ้ารางวัลได้มาเกิน 7 วัน จะไม่ขึ้น NEW ถึงแม้จะยังไม่เคยเปิดดูก็ตาม
            tabContentMaxHeight: '20vh', // ล็อกความสูงสูงสุดของกล่องรายละเอียด/เงื่อนไข ให้ Scroll ได้
            defaultImg: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2VlZSIvPjwvc3ZnPg=="
        };

        const i18n = {
            Th: {
                pageTitle: "กระเป๋าของฉัน",
                detailTitle: "รายละเอียดรางวัล",
                redeemedOn: "ได้รับเมื่อ: ",
                tabDetails: "รายละเอียด",
                tabTerms: "เงื่อนไข",
                loading: "กำลังโหลด...",
                loadMoreBtn: "โหลดเพิ่มเติม",
                emptyList: "ยังไม่มีของรางวัลในกระเป๋า",
                noDetails: "ไม่มีรายละเอียดเพิ่มเติม",
                noTerms: "ไม่มีเงื่อนไข",
                showCouponBtn: "แสดงรหัสคูปอง",
                couponUsedBtn: "คูปองนี้ถูกใช้งานแล้ว",
                statusUsed: "ใช้งานแล้ว",
                modalTitle: "รหัสคูปองของคุณ",
                modeText: "ข้อความ",
                modeQR: "QR Code",
                modeBarcode: "Barcode",
                yourCode: "Your Code",
                copyBtn: "คัดลอกรหัส",
                copiedSuccess: "คัดลอกรหัสเรียบร้อยแล้ว",
                scanQR: "Scan QR Code",
                scanBarcode: "Scan Barcode",
                scanFallback: "หากไม่สามารถสแกนได้ กรุณาใช้รหัสตัวเลขแทน หรือปรับความสว่างหน้าจอให้สูงสุด",
                errLoad: "ไม่สามารถโหลดข้อมูลกระเป๋าได้"
            },
            En: {
                pageTitle: "Inventory",
                detailTitle: "Reward Detail",
                redeemedOn: "Acquired on: ",
                tabDetails: "Details",
                tabTerms: "Terms",
                loading: "Loading...",
                loadMoreBtn: "Load More",
                emptyList: "Your inventory is empty.",
                noDetails: "No additional details.",
                noTerms: "No terms available.",
                showCouponBtn: "Show Code",
                couponUsedBtn: "Code Already Used",
                statusUsed: "REDEEMED",
                modalTitle: "Your Code",
                modeText: "Text",
                modeQR: "QR",
                modeBarcode: "Barcode",
                yourCode: "Your Code",
                copyBtn: "Copy",
                copiedSuccess: "Code copied successfully.",
                scanQR: "Scan QR Code",
                scanBarcode: "Scan Barcode",
                scanFallback: "If you cannot scan, please use the text code or adjust your screen brightness.",
                errLoad: "Failed to load inventory."
            }
        };

        // ==========================================
        // 2. STATE
        // ==========================================
        let currentLang = 'Th';
        let state = {
            items: [],
            page: 0,
            hasMore: true,
            isFetching: false,
            viewedIds: [], // เก็บ Array ของ ID ที่เคยคลิกดูแล้ว
            activeItem: null // ไอเท็มที่กำลังเปิดดู Detail
        };

        // ==========================================
        // 3. CORE LOGIC
        // ==========================================

        function applyLanguage() {
            const dict = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerText = dict[key];
            });
        }

        function initHeaderImage() {
            const headerImg = document.getElementById('inv-header-img');
            if (!headerImg) return;

            if (window.Utility && typeof Utility.getAssetPath === 'function') {
                const path = Utility.getAssetPath(pageSetting.headerAssetKey);
                if (path) {
                    headerImg.src = path;
                    headerImg.style.display = 'block';
                    return;
                }
            }
            headerImg.style.display = 'none';
        }

        function loadViewedIds() {
            try {
                const stored = localStorage.getItem(pageSetting.lsKeyViewed);
                if (stored) state.viewedIds = JSON.parse(stored);
            } catch (e) { console.error("LS Error", e); }
        }

        function saveViewedId(id) {
            if (!state.viewedIds.includes(id)) {
                state.viewedIds.push(id);
                try {
                    localStorage.setItem(pageSetting.lsKeyViewed, JSON.stringify(state.viewedIds));
                } catch (e) { }
            }
        }

        // --- Data Fetching ---
        async function fetchItems(isInitial = false) {
            if (state.isFetching || !state.hasMore) return;
            state.isFetching = true;

            const grid = document.getElementById('inv-grid');
            const loader = document.getElementById('inv-loader');
            const loadMoreBtn = document.getElementById('inv-load-more-btn');

            if (isInitial) {
                if (window.PageManager) PageManager.showLoading();
                state.page = 0;
                state.items = [];
                if (grid) grid.innerHTML = '';
                if (loadMoreBtn) loadMoreBtn.classList.add('inv-hidden');
            } else {
                if (loader) loader.classList.remove('inv-hidden');
                if (loadMoreBtn) loadMoreBtn.classList.add('inv-hidden');
            }

            try {
                const offset = state.page * pageSetting.limit;
                let response = null;

                if (window.CrmApi && typeof CrmApi.getMyCoupons === 'function') {
                    response = await CrmApi.getMyCoupons(pageSetting.limit, offset);
                }

                let newItems = [];
                let hasMore = false;

                if (response && response.coupons) {
                    // รูปแบบใหม่ { coupons: [...], pagination: { hasMore: true/false } }
                    newItems = response.coupons;
                    hasMore = response.pagination ? response.pagination.hasMore : false;
                } else if (Array.isArray(response)) {
                    // รูปแบบเดิม [ ... ]
                    newItems = response;
                    hasMore = newItems.length >= pageSetting.limit;
                }

                if (newItems && newItems.length > 0) {
                    state.items = state.items.concat(newItems);
                    renderItems(newItems);
                    state.page++;
                    state.hasMore = hasMore;
                } else {
                    state.hasMore = false;
                    if (isInitial) {
                        showEmptyState();
                    }
                }

                // จัดการปุ่ม Load More
                if (state.hasMore && state.items.length > 0) {
                    if (loadMoreBtn) loadMoreBtn.classList.remove('inv-hidden');
                } else {
                    if (loadMoreBtn) loadMoreBtn.classList.add('inv-hidden');
                }

            } catch (error) {
                console.error("Inventory Fetch Error:", error);
                if (isInitial && window.PageManager) {
                    PageManager.showToast(i18n[currentLang].errLoad, "❌");
                }
            } finally {
                state.isFetching = false;
                if (loader) loader.classList.add('inv-hidden');
                if (isInitial && window.PageManager) PageManager.hideLoading();
            }
        }

        // --- Rendering List ---
        function renderItems(itemsToRender) {
            const dict = i18n[currentLang];
            const now = Date.now();
            const grid = document.getElementById('inv-grid');
            const tplCard = document.getElementById('tpl-inv-item');

            if (!grid || !tplCard) return;

            itemsToRender.forEach(item => {
                const clone = tplCard.content.cloneNode(true);
                const card = clone.querySelector('.inv-card');

                clone.querySelector('.slot-name').innerText = item.rewardName || 'Item';
                clone.querySelector('.slot-desc').innerText = item.rewardDescription || '';
                clone.querySelector('.slot-img').src = item.rewardImage || pageSetting.defaultImg;

                // 1. ตรวจสอบสถานะ New (เช็ค 2 ชั้น: ยังไม่เคยดู + อายุไม่เกิน N วัน)
                let isNew = !state.viewedIds.includes(item.id);
                if (isNew && pageSetting.newDaysLimit > 0) {
                    const itemDateStr = item.redeemedAt || item.createdAt || item.updatedAt;
                    if (itemDateStr) {
                        const itemTime = new Date(itemDateStr).getTime();
                        if (!isNaN(itemTime)) {
                            const daysDiff = (now - itemTime) / (1000 * 3600 * 24);
                            if (daysDiff > pageSetting.newDaysLimit) {
                                isNew = false;
                            }
                        }
                    }
                }

                if (isNew) {
                    clone.querySelector('.inv-badge-new').classList.remove('inv-hidden');
                }

                // 2. ตรวจสอบสถานะ Used อย่างเข้มงวด
                // จะต้องเป็นค่า string "used" เท่านั้น จึงจะถือว่าใช้แล้ว
                const itemStatus = String(item.status || '').toLowerCase();
                const codeStatus = String(item.codeStatus || '').toLowerCase();
                const isUsed = (itemStatus === 'used' || codeStatus === 'used');

                if (isUsed) {
                    card.classList.add('is-used');
                    const usedTag = clone.querySelector('.slot-used-tag');
                    usedTag.innerText = dict.statusUsed;
                    usedTag.classList.remove('inv-hidden');
                }

                // Click Event -> Open Detail
                card.onclick = () => openDetail(item, card);

                grid.appendChild(clone);
            });
        }

        function showEmptyState() {
            const dict = i18n[currentLang];
            const grid = document.getElementById('inv-grid');
            if (grid) {
                grid.innerHTML = `
                <div class="inv-empty-state inv-fade-in">
                    <i class="fa-solid fa-box-open"></i>
                    <p>${dict.emptyList}</p>
                </div>
            `;
            }
        }

        // ==========================================
        // 4. DETAIL VIEW LOGIC
        // ==========================================

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString(currentLang === 'En' ? 'en-GB' : 'th-TH');
            } catch (e) { return dateStr; }
        }

        function openDetail(item, cardElement) {
            state.activeItem = item;
            const dict = i18n[currentLang];

            // 1. Mark as viewed & Hide Badge
            saveViewedId(item.id);
            if (cardElement) {
                const badgeNew = cardElement.querySelector('.inv-badge-new');
                if (badgeNew) badgeNew.classList.add('inv-hidden');
            }

            // 2. Populate Detail UI
            const detImg = document.getElementById('det-img');
            const detName = document.getElementById('det-name');
            const detDate = document.getElementById('det-date');
            const contentDesc = document.getElementById('content-desc');

            if (detImg) detImg.src = item.rewardImage || pageSetting.defaultImg;
            if (detName) detName.innerText = item.rewardName || 'Reward';
            if (detDate) detDate.innerText = formatDate(item.redeemedAt || item.createdAt);
            if (contentDesc) contentDesc.innerHTML = item.rewardDescription || dict.noDetails;

            // ดึงเงื่อนไข (ดึงจาก Reward API ถ้าทำได้ หรือ Fallback ไปหา item)
            let condition = item.termsConditions || item.notes || null;
            if (window.Utility && typeof Utility.getReward === 'function') {
                const rewardData = Utility.getReward(item.rewardId);
                if (rewardData && rewardData.termsConditions) {
                    condition = rewardData.termsConditions;
                }
            }

            const tabTerms = document.getElementById('tab-terms');
            const contentTerms = document.getElementById('content-terms');

            // ถ้าไม่มีข้อมูลเงื่อนไขเลย ให้ซ่อนแท็บเงื่อนไขไป
            if (condition && condition.trim() !== '') {
                if (tabTerms) tabTerms.style.display = 'block';
                if (contentTerms) contentTerms.innerHTML = condition;
            } else {
                if (tabTerms) tabTerms.style.display = 'none';
                if (contentTerms) contentTerms.innerHTML = '';
            }

            // Reset Tabs to Desc
            switchTab('desc');

            // 3. Handle Used Status & Action Button (Strict Check)
            const itemStatus = String(item.status || '').toLowerCase();
            const codeStatus = String(item.codeStatus || '').toLowerCase();
            const isUsed = (itemStatus === 'used' || codeStatus === 'used');

            const detUsedOverlay = document.getElementById('det-used-overlay');
            const btnAction = document.getElementById('det-btn-action');
            const btnActionText = document.getElementById('det-btn-text');

            if (isUsed) {
                if (detUsedOverlay) detUsedOverlay.classList.remove('inv-hidden');
                if (btnAction) {
                    btnAction.disabled = true;
                    const icon = btnAction.querySelector('i');
                    if (icon) icon.className = "fa-solid fa-check";
                }
                if (btnActionText) btnActionText.innerText = dict.couponUsedBtn;
            } else {
                if (detUsedOverlay) detUsedOverlay.classList.add('inv-hidden');
                if (btnAction) {
                    btnAction.disabled = false;
                    const icon = btnAction.querySelector('i');
                    if (icon) icon.className = "fa-solid fa-ticket";
                }
                if (btnActionText) btnActionText.innerText = dict.showCouponBtn;
            }

            // 4. Switch View
            const headerImg = document.getElementById('inv-header-img');
            const viewList = document.getElementById('inv-view-list');
            const viewDetail = document.getElementById('inv-view-detail');

            if (headerImg) headerImg.style.display = 'none';
            if (viewList) viewList.classList.add('inv-hidden');
            if (viewDetail) {
                viewDetail.classList.remove('inv-hidden');
                viewDetail.scrollTop = 0;
            }
        }

        window.goBackToList = function () {
            state.activeItem = null;
            const viewList = document.getElementById('inv-view-list');
            const viewDetail = document.getElementById('inv-view-detail');
            const headerImg = document.getElementById('inv-header-img');

            if (viewDetail) viewDetail.classList.add('inv-hidden');
            if (viewList) viewList.classList.remove('inv-hidden');

            if (headerImg && headerImg.src && headerImg.src !== window.location.href) {
                headerImg.style.display = 'block';
            }
        };

        window.switchTab = function (tabName) {
            const tabDesc = document.getElementById('tab-desc');
            const tabTerms = document.getElementById('tab-terms');
            const contentDesc = document.getElementById('content-desc');
            const contentTerms = document.getElementById('content-terms');

            if (tabDesc) tabDesc.classList.remove('active');
            if (tabTerms) tabTerms.classList.remove('active');
            if (contentDesc) contentDesc.classList.add('inv-hidden');
            if (contentTerms) contentTerms.classList.add('inv-hidden');

            const activeTab = document.getElementById(`tab-${tabName}`);
            const activeContent = document.getElementById(`content-${tabName}`);

            if (activeTab) activeTab.classList.add('active');
            if (activeContent) activeContent.classList.remove('inv-hidden');
        };

        // ==========================================
        // 5. MODAL & CODE LOGIC
        // ==========================================

        window.openCodeModal = function () {
            if (!state.activeItem) return;

            let code = state.activeItem.couponCode;
            if (typeof code === "string") {
                code = code.replace(/^#\[\d+\]#/, "");
                state.activeItem.cleanCode = code;
            }

            const modalOverlay = document.getElementById('code-modal');
            if (modalOverlay) modalOverlay.classList.add('show');

            setCodeMode('text');
        };

        window.closeCodeModal = function () {
            const modalOverlay = document.getElementById('code-modal');
            if (modalOverlay) modalOverlay.classList.remove('show');
        };

        window.setCodeMode = function (mode) {
            // Reset Buttons & Displays
            ['text', 'qr', 'barcode'].forEach(m => {
                const btn = document.getElementById(`mode-${m}`);
                const disp = document.getElementById(`disp-${m}`);
                if (btn) btn.classList.remove('active');
                if (disp) disp.classList.add('inv-hidden');
            });

            // Activate Selected
            const activeBtn = document.getElementById(`mode-${mode}`);
            const activeDisp = document.getElementById(`disp-${mode}`);

            if (activeBtn) activeBtn.classList.add('active');
            if (activeDisp) activeDisp.classList.remove('inv-hidden');

            // Generate Code
            const code = state.activeItem?.cleanCode || state.activeItem?.couponCode;
            if (!code) return;

            if (mode === 'text') {
                const uiCodeText = document.getElementById('ui-code-text');
                if (uiCodeText) uiCodeText.innerText = code;
            }
            else if (mode === 'qr') {
                // ไม่ต้องหน่วงเวลาแล้ว เพราะ Parent มี Fixed Height โครงสร้างไม่เปลี่ยนแล้ว
                setTimeout(() => {
                    try {
                        const uiQr = document.getElementById('ui-qrcode');
                        if (typeof QRCode !== 'undefined' && uiQr) {
                            uiQr.innerHTML = "";
                            new QRCode(uiQr, {
                                text: code,
                                width: 200, height: 200,
                                colorDark: "#1f2937", colorLight: "#ffffff",
                                correctLevel: QRCode.CorrectLevel.H
                            });
                        } else if (uiQr) {
                            uiQr.innerHTML = "QR Library not loaded";
                        }
                    } catch (e) { console.error(e); }
                }, 10);
            }
            else if (mode === 'barcode') {
                setTimeout(() => {
                    try {
                        const uiBarcode = document.getElementById('ui-barcode');
                        if (typeof JsBarcode !== 'undefined' && uiBarcode) {
                            JsBarcode("#ui-barcode", code, {
                                format: "CODE128",
                                width: 2.5, height: 80,
                                displayValue: true, fontSize: 18,
                                lineColor: "#1f2937", background: "transparent", margin: 0
                            });
                        } else if (uiBarcode && uiBarcode.parentElement) {
                            uiBarcode.parentElement.innerHTML = "Barcode Library not loaded";
                        }
                    } catch (e) { console.error(e); }
                }, 10);
            }
        };

        window.copyToClipboard = function () {
            const code = state.activeItem?.cleanCode || state.activeItem?.couponCode;
            if (!code) return;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(code).then(showCopySuccess).catch(() => fallbackCopy(code));
            } else {
                fallbackCopy(code);
            }
        };

        function fallbackCopy(text) {
            const temp = document.createElement("input");
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch (err) { }
            document.body.removeChild(temp);
        }

        function showCopySuccess() {
            if (window.PageManager) {
                PageManager.showToast(i18n[currentLang].copiedSuccess, "✅");
            }
        }

        // ==========================================
        // 6. INIT (Export)
        // ==========================================
        return {
            init: function (payload, response) {
                if (window.crmData && window.crmData.language === 'En') {
                    currentLang = 'En';
                }

                // Set Tab Max Height จาก Setting
                document.documentElement.style.setProperty('--tab-max-height', pageSetting.tabContentMaxHeight);

                applyLanguage();
                initHeaderImage();
                loadViewedIds();

                // Initial Fetch
                fetchItems(true);

                if (response) response.status = "ok";
            },
            loadMore: function () {
                fetchItems(false);
            },
            goBackToList: window.goBackToList,
            switchTab: window.switchTab,
            openCodeModal: window.openCodeModal,
            closeCodeModal: window.closeCodeModal,
            setCodeMode: window.setCodeMode,
            copyToClipboard: window.copyToClipboard
        };

    })();

    // ผูกเข้ากับระบบ PageManager
    window.onInit = function (payload, response) {
        window.InventoryCtrl.init(payload, response);
    };
</script>
