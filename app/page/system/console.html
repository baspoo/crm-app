<style>
    /* ==========================================
       Console App Shell Styles (Modern & Premium UI)
       * CSS ควบคุมเฉพาะหน้านี้ ไม่กวนหน้าอื่น *
       ========================================== */
    .console-wrapper {
        position: absolute;
        inset: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: transparent;
        z-index: 0;
    }

    /* เลเยอร์พื้นหลัง (เปลี่ยนเป็น Transparent เพื่อโชว์ Background จาก index.html แทน) */
    #console-bg-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: transparent;
        pointer-events: none;
    }

    /* Top Header */
    .console-header {
        flex: none;
        z-index: 20;
        padding: 1.25rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        background: transparent;
        transition: transform 0.3s ease;
        transform-origin: top;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .btn-back-console {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        display: none;
        align-items: center;
        justify-content: center;
        color: var(--theme-text-main, #1f2937);
        border: 1px solid rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        -webkit-tap-highlight-color: transparent;
        outline: none;
    }

    .btn-back-console:hover {
        background: #ffffff;
        color: var(--theme-primary, #3b82f6);
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .btn-back-console:active {
        transform: scale(0.9);
    }

    .console-page-title {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
        color: var(--theme-text-main, #1f2937);
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
    }

    /* Points Badge (มุมขวาบน) */
    .points-badge {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 0.375rem 0.875rem 0.375rem 0.375rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        gap: 0.375rem;
        box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.08);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        -webkit-tap-highlight-color: transparent;
        outline: none;
    }

    .points-badge:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.12);
        border-color: var(--theme-primary, #3b82f6);
        background: #ffffff;
    }

    .points-badge:active {
        transform: scale(0.95);
    }

    .point-icon-img {
        width: 1.6rem;
        height: 1.6rem;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(245, 158, 11, 0.3));
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .points-badge:hover .point-icon-img {
        transform: scale(1.15) rotate(8deg);
    }

    .points-val {
        font-weight: 800;
        color: var(--theme-primary, #2563eb);
        font-size: 1.05rem;
        line-height: 1;
    }

    /* Main Content Area */
    .main-content-area {
        flex-grow: 1;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
        width: 100%;
        background-color: transparent;
        z-index: 10;
        padding-bottom: 7rem;
    }

    /* Iframe & Modal */
    :root {
        --iframe-radius: 1.5rem;
        --iframe-border-width: 0px;
        --iframe-border-color: transparent;
        --iframe-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .iframe-layer {
        display: none;
        position: absolute;
        z-index: 40;
        background: transparent;
        flex-direction: column;
        border-radius: var(--iframe-radius);
        border: var(--iframe-border-width) solid var(--iframe-border-color);
        box-shadow: var(--iframe-shadow);
        transition: all 0.3s ease;
    }

    .iframe-layer.show {
        display: flex;
    }

    .iframe-layer.fullscreen {
        border-radius: 0 !important;
        border: none !important;
        box-shadow: none !important;
        width: 100% !important;
        height: 100% !important;
        top: 0 !important;
        left: 0 !important;
    }

    .btn-iframe-close-float {
        position: absolute;
        width: 2.25rem;
        height: 2.25rem;
        background: #ffffff;
        color: #4b5563;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 1px solid #f3f4f6;
        box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.15);
        z-index: 50;
        top: -1rem;
        right: -1rem;
        left: auto;
        -webkit-tap-highlight-color: transparent;
        outline: none;
    }

    .btn-iframe-close-float:hover {
        background: #fef2f2;
        color: #ef4444;
        transform: scale(1.1) rotate(90deg);
        border-color: #fca5a5;
    }

    .btn-iframe-close-float:active {
        transform: scale(0.9);
    }

    .iframe-layer.fullscreen .btn-iframe-close-float {
        top: 1rem;
        right: 1rem;
        left: auto;
    }

    .iframe-frame {
        width: 100%;
        flex-grow: 1;
        border: none;
        background: #ffffff;
        border-radius: inherit;
    }

    /* -----------------------------------------------------------------
       Floating Bottom Navigation
       ----------------------------------------------------------------- */
    .console-footer-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 0 1.25rem;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
        z-index: 20;
        pointer-events: none;
    }

    .console-footer {
        pointer-events: auto;
        flex: none;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 2.5rem;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.12), 0 8px 16px -4px rgba(0, 0, 0, 0.06);
        user-select: none;
        transition: transform 0.3s ease;
        overflow: hidden;
    }

    .nav-bar-grid {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 4.5rem;
        padding: 0 0.5rem;
    }

    .nav-item {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        color: var(--theme-text-muted, #9ca3af);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        border: none;
        background: transparent;
        position: relative;
        -webkit-tap-highlight-color: transparent;
        outline: none;
    }

    .nav-icon-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 3.5rem;
        height: 2rem;
        border-radius: 9999px;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 2;
    }

    .nav-item i {
        font-size: 1.25rem;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 2;
    }

    .nav-img-icon {
        width: 1.25rem;
        height: 1.25rem;
        object-fit: contain;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 2;
    }

    .nav-item span {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: all 0.3s ease;
    }

    .nav-item:hover {
        color: var(--theme-primary, #2563eb);
    }

    .nav-item:hover .nav-icon-wrap {
        background-color: rgba(255, 255, 255, 0.5);
        transform: translateY(-2px);
    }

    .nav-item.active {
        color: var(--theme-primary, #2563eb);
    }

    .nav-item.active span {
        font-weight: 800;
    }

    .nav-item.active .nav-icon-wrap {
        background-color: var(--theme-primary-light, #eff6ff);
        box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8), 0 4px 10px rgba(59, 130, 246, 0.15);
        transform: translateY(-2px);
    }

    .nav-item.active i,
    .nav-item.active .nav-img-icon {
        color: var(--theme-primary, #2563eb);
        transform: scale(1.15);
        filter: drop-shadow(0 2px 4px rgba(59, 130, 246, 0.3));
    }

    .nav-item:active .nav-icon-wrap {
        transform: scale(0.85);
    }
</style>

<div id="console-root" class="console-wrapper">

    <!-- พื้นหลังแอปพลิเคชัน -->
    <div id="console-bg-layer"></div>

    <!-- Top Navigation (Header) -->
    <header id="console-header" class="console-header">
        <div class="header-left">
            <button id="console-btn-back" class="btn-back-console" onclick="PageManager.loadPage('home')">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <h1 id="console-page-title" class="console-page-title">Home</h1>
        </div>

        <div class="header-right">
            <div class="points-badge" onclick="navigateConsole('history')">
                <img id="ui-console-point-icon" class="point-icon-img"
                    src="https://cdn-icons-png.flaticon.com/512/2583/2583133.png" alt="Point">
                <span id="ui-points" class="points-val">0</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content-area"></main>

    <!-- Iframe Container -->
    <div id="iframe-container" class="iframe-layer">
        <button id="btn-iframe-close-float" onclick="PageManager.closeIframe()" class="btn-iframe-close-float">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <iframe id="main-iframe" class="iframe-frame" src=""></iframe>
    </div>

    <!-- Modal Container -->
    <div id="sys-modal-backdrop"
        style="display:none; position:absolute; inset:0; background-color:rgba(0,0,0,0.6); z-index:35; backdrop-filter: blur(4px);"
        onclick="PageManager.closeModal()"></div>
    <div id="sys-modal-container" class="iframe-layer" style="z-index:36;">
        <button id="btn-modal-close-float" onclick="PageManager.closeModal()" class="btn-iframe-close-float">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div id="sys-modal-content-wrap"
            style="flex-grow:1; overflow-y:auto; overflow-x:hidden; width:100%; height:100%; position:relative; background-color:var(--theme-bg-app, #f8fafc); border-radius: inherit;">
        </div>
    </div>

    <!-- Bottom Navigation (Floating Dock) -->
    <div class="console-footer-wrap">
        <nav id="console-footer" class="console-footer">
            <div class="nav-bar-grid">
                <button onclick="navigateConsole('home')" id="nav-home" class="nav-item">
                    <div class="nav-icon-wrap" id="icon-wrap-home"></div>
                    <span data-i18n="navHome">Home</span>
                </button>
                <button onclick="navigateConsole('getpoint')" id="nav-getpoint" class="nav-item">
                    <div class="nav-icon-wrap" id="icon-wrap-getpoint"></div>
                    <span data-i18n="navMission">Mission</span>
                </button>
                <button onclick="navigateConsole('redeem')" id="nav-redeem" class="nav-item">
                    <div class="nav-icon-wrap" id="icon-wrap-redeem"></div>
                    <span data-i18n="navReward">Reward</span>
                </button>
                <button onclick="navigateConsole('leaderboard')" id="nav-leaderboard" class="nav-item">
                    <div class="nav-icon-wrap" id="icon-wrap-leaderboard"></div>
                    <span data-i18n="navRank">Rank</span>
                </button>
                <button onclick="navigateConsole('profile')" id="nav-profile" class="nav-item">
                    <div class="nav-icon-wrap" id="icon-wrap-profile"></div>
                    <span data-i18n="navProfile">Profile</span>
                </button>
            </div>
        </nav>
    </div>
</div>

<script>
    (async () => {
        // ==========================================
        // 1. PAGE SETTINGS 
        // ==========================================
        const pageSetting = {
            // ตั้งค่าไอคอนปุ่มหลักทั้ง 5 (รองรับ FontAwesome หรือ Image URL)
            navIcons: {
                home: { type: 'icon', value: 'fa-solid fa-house', activeValue: 'fa-solid fa-house' },
                getpoint: { type: 'icon', value: 'fa-solid fa-crosshairs', activeValue: 'fa-solid fa-crosshairs' },
                redeem: { type: 'icon', value: 'fa-solid fa-gift', activeValue: 'fa-solid fa-gift' },
                leaderboard: { type: 'icon', value: 'fa-solid fa-trophy', activeValue: 'fa-solid fa-trophy' },
                profile: { type: 'icon', value: 'fa-solid fa-user', activeValue: 'fa-solid fa-user' }
                // 💡 ตัวอย่างการใช้รูปภาพ:
                // promo: { type: 'image', value: 'res/example/icon_promo.png', bg: 'transparent' }
            }
        };

        // ==========================================
        // 2. LANGUAGE DICTIONARY
        // ==========================================
        const consoleDict = {
            Th: { navHome: "หน้าแรก", navMission: "ภารกิจ", navReward: "รางวัล", navRank: "อันดับ", navProfile: "โปรไฟล์" },
            En: { navHome: "Home", navMission: "Mission", navReward: "Reward", navRank: "Rank", navProfile: "Profile" }
        };

        function applyConsoleLanguage() {
            const lang = (window.crmData && window.crmData.language === 'En') ? 'En' : 'Th';
            const dict = consoleDict[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerText = dict[key];
            });
        }

        // ==========================================
        // 3. ฟังก์ชันเรนเดอร์ไอคอน
        // ==========================================
        function renderNavIcons(activePageKey) {
            Object.keys(pageSetting.navIcons).forEach(key => {
                const wrapEl = document.getElementById(`icon-wrap-${key}`);
                if (!wrapEl) return;

                const iconConf = pageSetting.navIcons[key];
                const isActive = (key === activePageKey);
                const val = isActive ? (iconConf.activeValue || iconConf.value) : iconConf.value;

                if (iconConf.type === 'image') {
                    wrapEl.innerHTML = `<img src="${val}" class="nav-img-icon" alt="${key}">`;
                } else {
                    wrapEl.innerHTML = `<i class="${val}"></i>`;
                }
            });
        }

        // ==========================================
        // 4. MAIN INIT & NAVIGATION
        // ==========================================
        if (window.PageManager) {
            PageManager.setContentContainer(document.getElementById('main-content'));
        }

        window.updateConsoleHeader = function () {
            applyConsoleLanguage();

            // อัปเดต Point Value
            if (window.Utility) {

                document.getElementById('ui-points').textContent = Utility.getPoints().toLocaleString();
            }

            // โหลดไอคอน Point แบบไดนามิก
            try {
                const ptIconEl = document.getElementById('ui-console-point-icon');
                let iconPath = null;
                if (window.Utility && typeof window.Utility.getAssetPath === 'function') {
                    iconPath = window.Utility.getAssetPath("pointIcon");
                } else if (window.appData && window.appData.customAssets && window.appData.customAssets.pointIcon) {
                    iconPath = window.appData.customAssets.pointIcon;
                }
                if (iconPath) ptIconEl.src = iconPath;
            } catch (e) {
                console.warn("Could not load custom point icon:", e);
            }
        };

        window.navigateConsole = function (pageKey) {
            // อัปเดต Active State ของปุ่ม
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const targetBtn = document.getElementById(`nav-${pageKey}`);
            if (targetBtn) targetBtn.classList.add('active');

            // อัปเดต Title
            const titleEl = document.getElementById('console-page-title');
            if (titleEl) {
                const titleMap = {
                    'home': 'Home', 'getpoint': 'Missions', 'redeem': 'Rewards',
                    'leaderboard': 'Ranking', 'profile': 'Profile', 'history': 'History'
                };
                titleEl.textContent = titleMap[pageKey] || pageKey.charAt(0).toUpperCase() + pageKey.slice(1);
            }

            // อัปเดตการแสดงผลไอคอน (เปลี่ยนรูปตามสถานะ Active)
            renderNavIcons(pageKey);

            if (window.PageManager) PageManager.loadPage(pageKey);
        };

        // เรียกเพื่อ Initialize UI ครั้งแรกเมื่อโหลด
        window.updateConsoleHeader();
        // บังคับเรนเดอร์ไอคอนให้ถูกต้องในหน้า Home ตอนโหลดครั้งแรก
        renderNavIcons('home');
        document.getElementById('nav-home').classList.add('active');

    })();
</script>
