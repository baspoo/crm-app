<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Test Page</title>
    <style>
        body {
            font-family: 'Prompt', -apple-system, sans-serif;
            padding: 1.5rem;
            background: #f8fafc;
            color: #1f2937;
            margin: 0;
        }

        .box {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: #111827;
        }

        pre {
            background: #111827;
            color: #4ade80;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #4b5563;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>1. Payload Received</h3>
        <p style="font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem;">ข้อมูลที่ส่งมาจากหน้าหลักตอนเปิด:</p>
        <pre id="payload-display">Waiting for oninit()...</pre>
    </div>

    <div class="box">
        <h3>2. Edit Response</h3>
        <p style="font-size: 0.875rem; color: #6b7280; margin-bottom: 1rem;">แก้ไขข้อมูลด้านล่าง
            แล้วกดปิดหน้าต่างเพื่อส่งกลับ (Callback)</p>

        <label>Response Message:</label>
        <input type="text" id="res-msg" value="Hello from iframe!">

        <label>Status Code:</label>
        <input type="number" id="res-code" value="200">

        <button onclick="closeAndSend()">Save & Close</button>
    </div>

    <script>
        let refResponse = null;

        // รับฟังก์ชันจากระบบ PageManager.openIframe
        window.oninit = function (payload, response) {
            document.getElementById('payload-display').textContent = JSON.stringify(payload, null, 2);
            // เก็บ reference ของ object response เอาไว้แก้ไขค่าทีหลัง
            refResponse = response;
        };

        function closeAndSend() {
            // เขียนทับค่าที่ต้องการส่งกลับ
            if (refResponse) {
                refResponse.message = document.getElementById('res-msg').value;
                refResponse.code = parseInt(document.getElementById('res-code').value);
                refResponse.editedBy = "Iframe Test Page";
            }

            // เรียกฟังก์ชันปิด Iframe ของหน้าต่างหลัก
            console.log(window.parent);
            console.log(window.parent.PageManager);
            if (window.parent && window.parent.PageManager) {
                window.parent.PageManager.closeIframe();
            }
        }
    </script>
</body>

</html>
