<style>
    /* ==========================================
       Login Page Styles
       อ้างอิงสีจาก Global Theme (--theme-primary, ฯลฯ)
       ========================================== */
    .login-wrapper {
        position: fixed;
        inset: 0;
        z-index: 40;
        background-color: var(--theme-bg-app, #f3f4f6);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        color: var(--theme-text-main, #1f2937);
    }

    .login-container {
        width: 100%;
        max-width: 24rem;
        position: relative;
    }

    /* Base Card Style */
    .login-card {
        background: var(--theme-bg-card, #ffffff);
        border-radius: var(--theme-radius, 2rem);
        padding: 2rem;
        box-shadow: var(--theme-shadow-hover, 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1));
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    /* Decos */
    .card-deco {
        position: absolute;
        top: -5rem;
        right: -5rem;
        width: 10rem;
        height: 10rem;
        background: var(--theme-primary-light, #eff6ff);
        border-radius: 9999px;
        filter: blur(40px);
        z-index: 0;
        pointer-events: none;
    }

    /* Store Info */
    .store-name-title {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--theme-text-main, #111827);
        margin-bottom: 1.5rem;
        z-index: 10;
        text-align: center;
        line-height: 1.25;
        margin-top: 0;
    }

    .profile-group {
        position: relative;
        margin-bottom: 2rem;
        z-index: 10;
    }

    .profile-img-main {
        width: 7rem;
        height: 7rem;
        border-radius: 9999px;
        border: 4px solid var(--theme-bg-card, #ffffff);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        object-fit: cover;
        background: var(--theme-bg-app, #f3f4f6);
    }

    .store-icon-sub {
        position: absolute;
        bottom: 0;
        right: -0.5rem;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        border: 3px solid var(--theme-bg-card, #ffffff);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        object-fit: cover;
        background: var(--theme-bg-card, #ffffff);
    }

    /* Inputs */
    .input-wrapper {
        width: 100%;
        margin-bottom: 1.5rem;
        z-index: 10;
        position: relative;
    }

    .input-icon-left {
        position: absolute;
        inset-y: 0;
        left: 0;
        padding-left: 1rem;
        display: flex;
        align-items: center;
        pointer-events: none;
        color: var(--theme-text-muted, #9ca3af);
    }

    .text-input-field {
        width: 100%;
        padding: 1rem 1rem 1rem 2.75rem;
        background: var(--theme-bg-app, #f9fafb);
        border: 1px solid var(--theme-border-color, #e5e7eb);
        border-radius: var(--theme-radius-btn, 1rem);
        font-size: 1.125rem;
        font-weight: 500;
        color: var(--theme-text-main, #1f2937);
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }

    .text-input-field:focus {
        background: var(--theme-bg-card, #ffffff);
        border-color: var(--theme-primary, #2563eb);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .text-input-field::placeholder {
        color: var(--theme-text-muted, #9ca3af);
    }

    /* Checkbox list */
    .check-list-group {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 2rem;
        z-index: 10;
    }

    .check-label-item {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        cursor: pointer;
    }

    .check-box-ui {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.125rem;
    }

    .check-input {
        appearance: none;
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid var(--theme-border-color, #d1d5db);
        border-radius: 0.25rem;
        background: var(--theme-bg-card, #ffffff);
        cursor: pointer;
        transition: all 0.2s ease;
        margin: 0;
    }

    .check-input:checked {
        background: var(--theme-primary, #2563eb);
        border-color: var(--theme-primary, #2563eb);
    }

    .check-icon {
        position: absolute;
        width: 0.875rem;
        height: 0.875rem;
        color: #ffffff;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .check-text-desc {
        font-size: 0.8125rem;
        color: var(--theme-text-muted, #4b5563);
        line-height: 1.25;
    }

    .check-link {
        color: var(--theme-primary, #2563eb);
        font-weight: 700;
        text-decoration: none;
    }

    .check-link:hover {
        text-decoration: underline;
    }

    /* Buttons */
    .btn-login-primary {
        width: 100%;
        background: var(--theme-primary, #2563eb);
        color: #ffffff;
        border-radius: var(--theme-radius-btn, 1rem);
        padding: 1rem;
        font-weight: 700;
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1rem;
    }

    .btn-login-primary:hover:not(:disabled) {
        filter: brightness(0.9);
    }

    .btn-login-primary:active:not(:disabled) {
        transform: scale(0.98);
    }

    .btn-login-primary:disabled {
        background-color: var(--theme-border-color, #d1d5db);
        box-shadow: none;
        cursor: not-allowed;
    }

    .btn-login-secondary {
        width: 100%;
        background: var(--theme-bg-app, #f3f4f6);
        color: var(--theme-text-muted, #6b7280);
        border-radius: var(--theme-radius-btn, 1rem);
        padding: 1rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 1rem;
    }

    .btn-login-secondary:hover {
        color: var(--theme-text-main, #374151);
        background: var(--theme-border-color, #e5e7eb);
    }

    .btn-login-secondary:active {
        transform: scale(0.98);
    }

    .spinner-loader {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 9999px;
        animation: spin 1s linear infinite;
        display: none;
    }

    .spinner-loader.show {
        display: block;
    }

    /* OTP Area */
    .otp-header-icon {
        width: 4rem;
        height: 4rem;
        background: var(--theme-primary-light, #eff6ff);
        color: var(--theme-primary, #2563eb);
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
    }

    .otp-title-text {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--theme-text-main, #111827);
        margin: 0 0 0.25rem 0;
    }

    .otp-subtitle-text {
        color: var(--theme-text-muted, #6b7280);
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        text-align: center;
        margin-top: 0;
    }

    .otp-input-group {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        width: 100%;
        justify-content: center;
    }

    .otp-digit-box {
        width: 3.5rem;
        height: 4rem;
        background: var(--theme-bg-app, #f9fafb);
        border: 1px solid var(--theme-border-color, #e5e7eb);
        border-radius: 0.75rem;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--theme-primary, #2563eb);
        outline: none;
        transition: all 0.2s ease;
    }

    .otp-digit-box:focus {
        background: var(--theme-bg-card, #ffffff);
        border-color: var(--theme-primary, #2563eb);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .otp-countdown-wrap {
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 2rem;
        text-align: center;
        height: 1.25rem;
    }

    .otp-countdown-val {
        color: var(--theme-primary, #2563eb);
        font-weight: 700;
        margin-left: 0.25rem;
    }

    .otp-btn-resend {
        color: var(--theme-primary, #2563eb);
        font-weight: 700;
        cursor: pointer;
        border: none;
        background: transparent;
        padding: 0;
        transition: all 0.2s ease;
    }

    .otp-btn-resend:hover {
        text-decoration: underline;
    }

    .hidden {
        display: none !important;
    }

    .fade-in {
        animation: fadeIn 0.3s ease-in-out forwards;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }
</style>

<div id="login-system-page" class="login-wrapper">
    <div id="login-root" class="login-container">

        <!-- ========================================== -->
        <!-- STEP 1: LOGIN / REGISTER                   -->
        <!-- ========================================== -->
        <div id="step-login" class="login-card fade-in">
            <div class="card-deco"></div>

            <h1 id="ui-store-name" class="store-name-title">Store Name</h1>

            <div class="profile-group">
                <img id="ui-profile-img"
                    src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2VlZSIvPjwvc3ZnPg=="
                    alt="Profile" class="profile-img-main">
                <img id="ui-store-icon"
                    src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2VlZSIvPjwvc3ZnPg=="
                    alt="Store Icon" class="store-icon-sub">
            </div>

            <div class="input-wrapper">
                <div class="input-icon-left">
                    <svg class="w-5 h-5" style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                        </path>

                </div>
                <!-- กำหนด data-i18n-placeholder สำหรับระบบภาษา -->
                <input type="tel" id="input-phone" data-i18n-placeholder="phonePlaceholder"
                    placeholder="เบอร์โทรศัพท์ของฉัน" class="text-input-field">
            </div>

            <div class="check-list-group">
                <!-- Checkbox: Terms (Required) -->
                <label class="check-label-item">
                    <div class="check-box-ui">
                        <input type="checkbox" id="chk-terms" class="check-input">
                        <svg class="check-icon" id="chk-terms-icon" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </div>
                    <span class="check-text-desc">
                        <span data-i18n="termsText1">ฉันได้อ่านและยอมรับ</span>
                        <a href="#" id="link-terms" class="check-link" onclick="openCondition(event)"
                            data-i18n="termsLink">ข้อกำหนดและเงื่อนไข</a>
                        <span data-i18n="termsText2">ในการเชื่อมต่อข้อมูล</span>
                    </span>
                </label>

                <!-- Checkbox: Marketing (Optional) -->
                <label class="check-label-item">
                    <div class="check-box-ui">
                        <input type="checkbox" id="chk-marketing" class="check-input">
                        <svg class="check-icon" id="chk-marketing-icon" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </div>
                    <span class="check-text-desc" data-i18n="marketingText">
                        ฉันยินยอมรับข่าวสารโปรโมชั่น และสิทธิพิเศษจากแบรนด์ (ไม่บังคับ)
                    </span>
                </label>
            </div>

            <!-- ปุ่มล็อคโดยเริ่มต้น จะเปิดเมื่อกดยอมรับ Terms เท่านั้น -->
            <button id="btn-register" class="btn-login-primary opacity-50 cursor-not-allowed" disabled>
                <span id="btn-register-text" data-i18n="btnLogin">ลงทะเบียน / เข้าสู่ระบบ</span>
                <div id="btn-register-loader" class="spinner-loader"></div>
            </button>
        </div>


        <!-- ========================================== -->
        <!-- STEP 2: OTP VERIFICATION                   -->
        <!-- ========================================== -->
        <div id="step-otp" class="login-card fade-in hidden">
            <div class="otp-header-icon">
                <svg style="width: 2rem; height: 2rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">

            <h2 class="otp-title-text" data-i18n="otpTitle">กรอกรหัส OTP</h2>
            <p class="otp-subtitle-text">
                <span data-i18n="otpSub1">ระบบได้ส่งรหัส OTP ไปที่เบอร์</span><br>
                <span id="display-phone" style="font-weight: 700; color: #1f2937;"></span><br>
                <span style="font-size: 0.75rem;"><span data-i18n="otpRef">Ref:</span> <span id="otp-ref"
                        style="font-weight: 700; color: #374151;">---</span></span>
            </p>

            <div class="otp-input-group" id="otp-inputs-container">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit-box">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit-box">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit-box">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit-box">
            </div>

            <div class="otp-countdown-wrap">
                <div id="countdown-wrapper" style="color: #6b7280;">
                    <span data-i18n="otpNoCode">ไม่ได้รับรหัส? ส่งอีกครั้งใน</span> <span id="otp-countdown"
                        class="otp-countdown-val">01:00</span>
                </div>
                <button id="btn-resend" class="otp-btn-resend hidden" data-i18n="otpResendBtn">
                    ส่งรหัส OTP อีกครั้ง
                </button>
            </div>

            <button id="btn-verify" class="btn-login-primary" style="margin-bottom: 0.75rem;">
                <span id="btn-verify-text" data-i18n="otpVerifyBtn">ยืนยันรหัส OTP</span>
                <div id="btn-verify-loader" class="spinner-loader"></div>
            </button>

            <button id="btn-change-phone" class="btn-login-secondary" data-i18n="otpChangePhoneBtn">
                กลับไปเปลี่ยนเบอร์
            </button>
        </div>

    </div>
</div>

<script>
    (() => {
        // ==========================================
        // 1. PAGE SETTINGS 
        // ==========================================
        const pageSetting = {
            // โลโก้หรือรูปภาพร้านค้าสำรอง (กรณีไม่มีมากับ Payload)
            defaultStoreIcon: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2VlZSIvPjwvc3ZnPg==",
            // เวลาของ OTP Countdown (วินาที)
            defaultOtpCountdown: 60
        };

        // ==========================================
        // 2. LANGUAGE DICTIONARY
        // ==========================================
        const i18nDict = {
            Th: {
                phonePlaceholder: "เบอร์โทรศัพท์ของฉัน",
                termsText1: "ฉันได้อ่านและยอมรับ ",
                termsLink: "ข้อกำหนดและเงื่อนไข",
                termsText2: " ในการเชื่อมต่อข้อมูล",
                marketingText: "ฉันยินยอมรับข่าวสารโปรโมชั่น และสิทธิพิเศษจากแบรนด์ (ไม่บังคับ)",
                btnLogin: "ลงทะเบียน / เข้าสู่ระบบ",
                otpTitle: "กรอกรหัส OTP",
                otpSub1: "ระบบได้ส่งรหัส OTP ไปที่เบอร์",
                otpRef: "Ref:",
                otpNoCode: "ไม่ได้รับรหัส? ส่งอีกครั้งใน",
                otpResendBtn: "ส่งรหัส OTP อีกครั้ง",
                otpVerifyBtn: "ยืนยันรหัส OTP",
                otpChangePhoneBtn: "กลับไปเปลี่ยนเบอร์",
                toastPhoneEmpty: "กรุณากรอกเบอร์โทรศัพท์",
                errorConnect: "การเชื่อมต่อผิดพลาด",
                errorGeneral: "เกิดข้อผิดพลาด กรุณาลองอีกครั้ง",
                errorOtpFormat: "กรุณากรอก PIN ให้ครบ 4 หลัก",
                errorOtpWrong: "รหัส OTP ไม่ถูกต้อง กรุณาลองใหม่",
                errorOtpProcess: "เกิดข้อผิดพลาดในการยืนยันรหัส",
                loginSuccessTitle: "ยินดีต้อนรับ",
                loginSuccessDesc: "เข้าสู่ระบบสำเร็จ",
                loginProcessing: "กำลังบันทึกข้อมูล..."
            },
            En: {
                phonePlaceholder: "My Phone Number",
                termsText1: "I have read and agree to the ",
                termsLink: "Terms & Conditions",
                termsText2: " for data connection",
                marketingText: "I consent to receive promotional news and brand privileges (Optional)",
                btnLogin: "Register / Login",
                otpTitle: "Enter OTP Code",
                otpSub1: "The system has sent an OTP code to",
                otpRef: "Ref:",
                otpNoCode: "Didn't receive code? Resend in",
                otpResendBtn: "Resend OTP Code",
                otpVerifyBtn: "Verify OTP Code",
                otpChangePhoneBtn: "Back to change number",
                toastPhoneEmpty: "Please enter your phone number",
                errorConnect: "Connection error",
                errorGeneral: "An error occurred, please try again",
                errorOtpFormat: "Please enter 4-digit PIN",
                errorOtpWrong: "Incorrect OTP code, please try again",
                errorOtpProcess: "An error occurred during verification",
                loginSuccessTitle: "Welcome",
                loginSuccessDesc: "Login successful",
                loginProcessing: "Saving data..."
            }
        };

        const state = {
            userId: "", idToken: "", phone: "", verificationToken: "", refNo: "", expiresIn: pageSetting.defaultOtpCountdown, countdownTimer: null
        };

        let currentLang = 'Th';

        function applyLanguage() {
            if (window.crmData && window.crmData.language) {
                currentLang = window.crmData.language === 'En' ? 'En' : 'Th';
            }
            const dict = i18nDict[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (dict[key]) el.placeholder = dict[key];
            });
        }

        // ==========================================
        // 3. LOGIC & INITIALIZATION
        // ==========================================

        // จัดการ Checkbox และการตรวจสอบเปิด/ปิดปุ่ม
        const setupCheckbox = (id) => {
            const chk = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            chk.addEventListener('change', (e) => {
                if (e.target.checked) icon.style.opacity = '1';
                else icon.style.opacity = '0';
                state[id] = e.target.checked;

                // ควบคุมปุ่มเข้าสู่ระบบ: ต้องยอมรับ terms ถึงจะกดปุ่มได้
                if (id === 'chk-terms') {
                    const btnReg = document.getElementById('btn-register');
                    if (e.target.checked) {
                        btnReg.disabled = false;
                        btnReg.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        btnReg.disabled = true;
                        btnReg.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                }
            });
        };

        function initUI() {
            applyLanguage();
            const payload = crmData?.LIFF_PAYLOAD;
            if (payload) {
                state.userId = payload.userId;
                state.idToken = payload.idToken;
                if (payload.storeInfo?.storeName) document.getElementById('ui-store-name').innerText = payload.storeInfo.storeName;
                if (payload.pictureUrl) document.getElementById('ui-profile-img').src = payload.pictureUrl;
                if (payload.storeInfo?.logoURL) document.getElementById('ui-store-icon').src = payload.storeInfo.logoURL;
            } else {
                document.getElementById('ui-store-name').innerText = "My CRM Store";
            }
        }

        function setupEventListeners() {
            setupCheckbox('chk-terms');
            setupCheckbox('chk-marketing');

            document.getElementById('btn-register').addEventListener('click', () => handleAuth(false));
            document.getElementById('btn-verify').addEventListener('click', handleVerify);
            document.getElementById('btn-resend').addEventListener('click', () => handleAuth(true));

            document.getElementById('btn-change-phone').addEventListener('click', () => {
                clearInterval(state.countdownTimer);
                document.getElementById('step-otp').classList.add('hidden');
                document.getElementById('step-login').classList.remove('hidden');
                document.querySelectorAll('.otp-digit-box').forEach(input => input.value = '');
            });
        }

        window.openCondition = function (e) {
            e.preventDefault();
            e.stopPropagation();
            const conditionURL = crmData?.LIFF_PAYLOAD?.storeInfo?.conditionURL || appConfig?.systemPage?.condition?.path || 'page/system/condition.html';
            if (PageManager) PageManager.loadIframe(conditionURL);
        };

        async function handleAuth(isResend = false) {
            const phone = document.getElementById('input-phone').value.trim();
            const dict = i18nDict[currentLang];

            if (!isResend) {
                if (!phone) return PageManager?.showToast(dict.toastPhoneEmpty, '⚠️');
                // เงื่อนไข chk-terms ไม่ผ่านจะไม่สามารถกดปุ่มได้ตั้งแต่แรกแล้ว
            }

            state.phone = phone;
            setLoading('btn-register', true);
            if (isResend) document.getElementById('btn-resend').innerText = "กำลังส่ง..."; // ใช้ loading คร่าวๆ ก่อน

            try {
                const res = await CrmApi.login(state.userId, state.idToken, state.phone);
                setLoading('btn-register', false);

                if (res?.result?.code == 200) {
                    const action = res.result.data.action;
                    if (action == "OPEN_OTP_PIN") {
                        state.verificationToken = res.result.data.verificationToken;
                        state.refNo = res.result.data.refNo;
                        state.expiresIn = res.result.data.expiresIn || pageSetting.defaultOtpCountdown;
                        showOTPStep();
                    }
                    else if (action == "LOGIN_DONE") await finishLogin();
                    else showError(res.result.message || dict.errorGeneral);
                } else {
                    showError(res?.result?.message || dict.errorConnect);
                }
            } catch (error) {
                setLoading('btn-register', false);
                showError(dict.errorGeneral);
            }
        }

        function showOTPStep() {
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
            document.getElementById('display-phone').innerText = state.phone;
            document.getElementById('otp-ref').innerText = state.refNo;

            const inputs = document.querySelectorAll('.otp-digit-box');
            inputs.forEach(input => input.value = '');
            setTimeout(() => inputs[0].focus(), 100);
            startCountdown(state.expiresIn);
        }

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-digit-box');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value !== '') {
                        if (index < inputs.length - 1) inputs[index + 1].focus();
                        else input.blur();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) inputs[index - 1].focus();
                    if (e.key === 'Enter') handleVerify();
                });
            });
        }

        function startCountdown(seconds) {
            clearInterval(state.countdownTimer);
            let timeLeft = seconds;
            const wrapper = document.getElementById('countdown-wrapper');
            const display = document.getElementById('otp-countdown');
            const btnResend = document.getElementById('btn-resend');

            wrapper.classList.remove('hidden');
            btnResend.classList.add('hidden');

            // รีเซ็ตข้อความปุ่มในกรณีที่เป็นการกด resend ก่อนหน้านี้
            btnResend.innerText = i18nDict[currentLang].otpResendBtn;

            const updateDisplay = () => {
                display.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
            };
            updateDisplay();
            state.countdownTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(state.countdownTimer);
                    wrapper.classList.add('hidden');
                    btnResend.classList.remove('hidden');
                }
            }, 1000);
        }

        async function handleVerify() {
            const inputs = document.querySelectorAll('.otp-digit-box');
            const dict = i18nDict[currentLang];
            let pin = Array.from(inputs).map(i => i.value).join('');
            if (pin.length < 4) return PageManager?.showToast(dict.errorOtpFormat, '⚠️');

            setLoading('btn-verify', true);
            try {
                const res = await CrmApi.onOTPVerify(state.verificationToken, pin);
                setLoading('btn-verify', false);

                if (res === "VERIFY_DONE") {
                    if (CrmApi) {
                        const loginRes = await CrmApi.login(state.userId, state.idToken, null);
                        await CrmApi.loginDone(loginRes);
                    }
                    await finishLogin();
                } else {
                    showError(dict.errorOtpWrong);
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                }
            } catch (error) {
                setLoading('btn-verify', false);
                showError(dict.errorOtpProcess);
            }
        }

        async function finishLogin() {
            if (PageManager) {
                const dict = i18nDict[currentLang];
                PageManager.showLoading(dict.loginProcessing);

                try {
                    // หากลูกค้ายินยอมรับข่าวสาร (chk-marketing == true) อัปเดตข้อมูล Profile
                    if (state["chk-marketing"] === true) {
                        const body = {};
                        body[TYPES.customFields.customFields.consent_notif] = true;
                        if (window.CrmApi && typeof window.CrmApi.updateProfileCustomFields === 'function') {
                            await CrmApi.updateProfileCustomFields(body);
                        }
                    }
                } catch (e) {
                    console.error("Failed to update profile custom fields:", e);
                } finally {
                    PageManager.hideLoading();
                }

                PageManager.showComplete(dict.loginSuccessTitle, dict.loginSuccessDesc, null, () => {
                    document.getElementById('login-system-page')?.remove();
                    if (window.updateConsoleHeader) window.updateConsoleHeader();
                    PageManager.loadPage('home');
                });
            }
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = document.getElementById(`${btnId}-text`);
            const loader = document.getElementById(`${btnId}-loader`);
            if (isLoading) {
                text.classList.add('hidden');
                loader.classList.add('show');
                // ป้องกันการกดย้ำ
                btn.style.opacity = '0.8';
                btn.style.pointerEvents = 'none';
            } else {
                text.classList.remove('hidden');
                loader.classList.remove('show');
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }

        function showError(msg) {
            if (PageManager) PageManager.showFailed("ผิดพลาด", msg);
            else alert("Error: " + msg);
        }

        initUI();
        setupOTPInputs();
        setupEventListeners();
    })();
</script>
