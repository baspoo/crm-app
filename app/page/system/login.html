<style>
    /* ==========================================
       Login Page Styles
       ========================================== */
    .login-wrapper {
        position: fixed;
        inset: 0;
        z-index: 40;
        background-color: #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        color: #1f2937;
    }

    .login-container {
        width: 100%;
        max-width: 24rem;
        position: relative;
    }

    /* Base Card Style */
    .login-card {
        background: #fff;
        border-radius: 2rem;
        padding: 2rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    /* Decos */
    .card-deco {
        position: absolute;
        top: -5rem;
        right: -5rem;
        width: 10rem;
        height: 10rem;
        background: var(--color-primary-light, #eff6ff);
        border-radius: 9999px;
        filter: blur(40px);
        z-index: 0;
        pointer-events: none;
    }

    /* Store Info */
    .store-name-title {
        font-size: 1.5rem;
        font-weight: 900;
        color: #111827;
        margin-bottom: 1.5rem;
        z-index: 10;
        text-align: center;
        line-height: 1.25;
        margin-top: 0;
    }

    .profile-group {
        position: relative;
        margin-bottom: 2rem;
        z-index: 10;
    }

    .profile-img-main {
        width: 7rem;
        height: 7rem;
        border-radius: 9999px;
        border: 4px solid #fff;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        object-fit: cover;
        background: #f3f4f6;
    }

    .store-icon-sub {
        position: absolute;
        bottom: 0;
        right: -0.5rem;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        border: 3px solid #fff;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        object-fit: cover;
        background: #fff;
    }

    /* Inputs */
    .input-wrapper {
        width: 100%;
        margin-bottom: 1.5rem;
        z-index: 10;
        position: relative;
    }

    .input-icon-left {
        position: absolute;
        inset-y: 0;
        left: 0;
        padding-left: 1rem;
        display: flex;
        align-items: center;
        pointer-events: none;
        color: #9ca3af;
    }

    .text-input-field {
        width: 100%;
        padding: 1rem 1rem 1rem 2.75rem;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        font-size: 1.125rem;
        font-weight: 500;
        color: #1f2937;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }

    .text-input-field:focus {
        background: #fff;
        border-color: var(--color-primary, #2563eb);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .text-input-field::placeholder {
        color: #9ca3af;
    }

    /* Checkbox list */
    .check-list-group {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 2rem;
        z-index: 10;
    }

    .check-label-item {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        cursor: pointer;
    }

    .check-box-ui {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.125rem;
    }

    .check-input {
        appearance: none;
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid #d1d5db;
        border-radius: 0.25rem;
        background: #fff;
        cursor: pointer;
        transition: all 0.2s ease;
        margin: 0;
    }

    .check-input:checked {
        background: var(--color-primary, #2563eb);
        border-color: var(--color-primary, #2563eb);
    }

    .check-icon {
        position: absolute;
        width: 0.875rem;
        height: 0.875rem;
        color: #fff;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .check-text-desc {
        font-size: 0.8125rem;
        color: #4b5563;
        line-height: 1.25;
    }

    .check-link {
        color: var(--color-primary, #2563eb);
        font-weight: 700;
        text-decoration: none;
    }

    .check-link:hover {
        text-decoration: underline;
    }

    /* Buttons */
    .btn-login-primary {
        width: 100%;
        background: var(--color-primary, #2563eb);
        color: #fff;
        border-radius: 1rem;
        padding: 1rem;
        font-weight: 700;
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1rem;
    }

    .btn-login-primary:hover {
        filter: brightness(0.9);
    }

    .btn-login-primary:active {
        transform: scale(0.98);
    }

    .btn-login-secondary {
        width: 100%;
        background: #f3f4f6;
        color: #6b7280;
        border-radius: 1rem;
        padding: 1rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 1rem;
    }

    .btn-login-secondary:hover {
        color: #374151;
        background: #e5e7eb;
    }

    .btn-login-secondary:active {
        transform: scale(0.98);
    }

    .spinner-loader {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 9999px;
        animation: spin 1s linear infinite;
        display: none;
    }

    .spinner-loader.show {
        display: block;
    }

    /* OTP Area */
    .otp-header-icon {
        width: 4rem;
        height: 4rem;
        background: var(--color-primary-light, #eff6ff);
        color: var(--color-primary, #2563eb);
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
    }

    .otp-title-text {
        font-size: 1.5rem;
        font-weight: 900;
        color: #111827;
        margin: 0 0 0.25rem 0;
    }

    .otp-subtitle-text {
        color: #6b7280;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        text-align: center;
        margin-top: 0;
    }

    .otp-input-group {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        width: 100%;
        justify-content: center;
    }

    .otp-digit-box {
        width: 3.5rem;
        height: 4rem;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-primary, #2563eb);
        outline: none;
        transition: all 0.2s ease;
    }

    .otp-digit-box:focus {
        background: #fff;
        border-color: var(--color-primary, #2563eb);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .otp-countdown-wrap {
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 2rem;
        text-align: center;
        height: 1.25rem;
    }

    .otp-countdown-val {
        color: var(--color-primary, #2563eb);
        font-weight: 700;
        margin-left: 0.25rem;
    }

    .otp-btn-resend {
        color: var(--color-primary, #2563eb);
        font-weight: 700;
        cursor: pointer;
        border: none;
        background: transparent;
        padding: 0;
        transition: all 0.2s ease;
    }

    .otp-btn-resend:hover {
        text-decoration: underline;
    }

    .hidden {
        display: none !important;
    }

    .fade-in {
        animation: fadeIn 0.3s ease-in-out forwards;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }
</style>

                <img id="ui-store-icon"

<script>
    (() => {
        // Toggle Custom Checkbox visual manually since we removed Tailwind peer classes
        const setupCheckbox = (id) => {
            const chk = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            chk.addEventListener('change', (e) => {
                if (e.target.checked) icon.style.opacity = '1';
                else icon.style.opacity = '0';
            });
        };
        setupCheckbox('chk-terms');
        setupCheckbox('chk-marketing');

        const state = {
            userId: "", idToken: "", phone: "", verificationToken: "", refNo: "", expiresIn: 60, countdownTimer: null
        };

        function initUI() {
            const payload = crmData?.LIFF_PAYLOAD;
            if (payload) {
                state.userId = payload.userId;
                state.idToken = payload.idToken;
                if (payload.storeInfo?.storeName) document.getElementById('ui-store-name').innerText = payload.storeInfo.storeName;
                if (payload.pictureUrl) document.getElementById('ui-profile-img').src = payload.pictureUrl;
                if (payload.storeInfo?.logoURL) document.getElementById('ui-store-icon').src = payload.storeInfo.logoURL;
            } else {
                document.getElementById('ui-store-name').innerText = "My CRM Store";
            }
        }

        function setupEventListeners() {
            document.getElementById('btn-register').addEventListener('click', () => handleAuth(false));
            document.getElementById('btn-verify').addEventListener('click', handleVerify);
            document.getElementById('btn-resend').addEventListener('click', () => handleAuth(true));

            document.getElementById('btn-change-phone').addEventListener('click', () => {
                clearInterval(state.countdownTimer);
                document.getElementById('step-otp').classList.add('hidden');
                document.getElementById('step-login').classList.remove('hidden');
                document.querySelectorAll('.otp-digit-box').forEach(input => input.value = '');
            });
        }

        window.openCondition = function (e) {
            e.preventDefault();
            e.stopPropagation();
            const conditionURL = crmData?.LIFF_PAYLOAD?.storeInfo?.conditionURL || appConfig?.systemPage?.condition?.path || 'page/system/condition.html';
            if (PageManager) PageManager.loadIframe(conditionURL);
        };

        async function handleAuth(isResend = false) {
            const phone = document.getElementById('input-phone').value.trim();
            const chkTerms = document.getElementById('chk-terms');

            if (!isResend) {
                if (!phone) return PageManager?.showToast('กรุณากรอกเบอร์โทรศัพท์', '⚠️');
                if (!chkTerms.checked) return PageManager?.showToast('กรุณายอมรับข้อกำหนดและเงื่อนไข', '⚠️');
            }

            state.phone = phone;
            setLoading('btn-register', true);
            if (isResend) document.getElementById('btn-resend').innerText = "กำลังส่ง...";

            try {
                const res = await CrmApi.login(state.userId, state.idToken, state.phone);
                setLoading('btn-register', false);

                if (res?.result?.code == 200) {
                    const action = res.result.data.action;
                    if (action == "OPEN_OTP_PIN") {
                        state.verificationToken = res.result.data.verificationToken;
                        state.refNo = res.result.data.refNo;
                        state.expiresIn = res.result.data.expiresIn || 60;
                        showOTPStep();
                    }
                    else if (action == "LOGIN_DONE") finishLogin();
                    else showError(res.result.message || 'ไม่สามารถทำรายการได้ กรุณาลองใหม่');
                } else {
                    showError(res?.result?.message || 'การเชื่อมต่อผิดพลาด');
                }
            } catch (error) {
                setLoading('btn-register', false);
                showError('เกิดข้อผิดพลาด กรุณาลองอีกครั้ง');
            }
        }

        function showOTPStep() {
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
            document.getElementById('display-phone').innerText = state.phone;
            document.getElementById('otp-ref').innerText = state.refNo;

            const inputs = document.querySelectorAll('.otp-digit-box');
            inputs.forEach(input => input.value = '');
            setTimeout(() => inputs[0].focus(), 100);
            startCountdown(state.expiresIn);
        }

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-digit-box');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value !== '') {
                        if (index < inputs.length - 1) inputs[index + 1].focus();
                        else input.blur();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) inputs[index - 1].focus();
                    if (e.key === 'Enter') handleVerify();
                });
            });
        }

        function startCountdown(seconds) {
            clearInterval(state.countdownTimer);
            let timeLeft = seconds;
            const wrapper = document.getElementById('countdown-wrapper');
            const display = document.getElementById('otp-countdown');
            const btnResend = document.getElementById('btn-resend');

            wrapper.classList.remove('hidden');
            btnResend.classList.add('hidden');
            btnResend.innerText = "ส่งรหัส OTP อีกครั้ง";

            const updateDisplay = () => {
                display.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
            };
            updateDisplay();
            state.countdownTimer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(state.countdownTimer);
                    wrapper.classList.add('hidden');
                    btnResend.classList.remove('hidden');
                }
            }, 1000);
        }

        async function handleVerify() {
            const inputs = document.querySelectorAll('.otp-digit-box');
            let pin = Array.from(inputs).map(i => i.value).join('');
            if (pin.length < 4) return PageManager?.showToast('กรุณากรอก PIN ให้ครบ 4 หลัก', '⚠️');

            setLoading('btn-verify', true);
            try {
                const res = await CrmApi.onOTPVerify(state.verificationToken, pin);
                setLoading('btn-verify', false);

                if (res === "VERIFY_DONE") {
                    if (CrmApi) {
                        const loginRes = await CrmApi.login(state.userId, state.idToken, null);
                        await CrmApi.loginDone(loginRes);
                    }
                    finishLogin();
                } else {
                    showError('รหัส OTP ไม่ถูกต้อง กรุณาลองใหม่');
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                }
            } catch (error) {
                setLoading('btn-verify', false);
                showError('เกิดข้อผิดพลาดในการยืนยันรหัส');
            }
        }

        function finishLogin() {
            if (PageManager) {
                PageManager.showComplete("ยินดีต้อนรับ", "เข้าสู่ระบบสำเร็จ", null, () => {
                    document.getElementById('login-system-page')?.remove();
                    if (window.updateConsoleHeader) window.updateConsoleHeader();
                    PageManager.loadPage('home');
                });
            }
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = document.getElementById(`${btnId}-text`);
            const loader = document.getElementById(`${btnId}-loader`);
            if (isLoading) {
                text.classList.add('hidden');
                loader.classList.add('show');
                btn.style.opacity = '0.8';
                btn.style.pointerEvents = 'none';
            } else {
                text.classList.remove('hidden');
                loader.classList.remove('show');
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }

        function showError(msg) {
            if (PageManager) PageManager.showFailed("ผิดพลาด", msg);
            else alert("Error: " + msg);
        }

        initUI();
        setupOTPInputs();
        setupEventListeners();
    })();
</script>
