<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คู่มือการหาหมายเลขคำสั่งซื้อ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .state-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* ปรับปรุง Animation ให้การซ่อนรูปเกิดขึ้นทันที แต่การแสดงรูปค่อยๆ Fade */
        .image-container img {
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }

        /* ใช้ class พิเศษเพื่อปิด transition ตอนซ่อนรูป */
        .image-container img.no-transition {
            transition: none !important;
        }

        .image-container img.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .platform-card {
            transition: all 0.2s ease;
        }

        .platform-card:active {
            transform: scale(0.96);
        }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            z-index: 20;
        }

        .arrow-btn:active {
            transform: scale(0.9) translateY(-50%);
        }

        .arrow-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <!-- 1. Selection State -->
    <div id="selectionState" class="state-transition flex-grow flex flex-col p-6 overflow-y-auto">
        <div class="text-center mb-10 mt-6">
            <div class="inline-block px-4 py-1.5 mb-4 bg-blue-50 rounded-full border border-blue-100">
                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em]" data-i18n="userGuide">User
                    Guide</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight leading-tight">
                <span data-i18n="mainTitle1">ขั้นตอนวิธีการหา</span> <br>
                <span class="text-blue-600" data-i18n="mainTitle2">หมายเลขคำสั่งซื้อ OrderId</span>
            </h1>
            <div class="h-1 w-12 bg-blue-500 mx-auto my-5 rounded-full opacity-30"></div>
            <p class="text-slate-400 text-sm font-medium italic" data-i18n="subTitle">
                กรุณาเลือกช่องทางที่คุณสั่งซื้อสินค้าครับ</p>
        </div>

        <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto w-full" id="platformGrid"></div>

        <p class="text-center text-slate-300 text-[10px] mt-10 italic" data-i18n="footerNote">
            *หากไม่พบหมายเลขคำสั่งซื้อ กรุณาติดต่อแอดมินผ่านช่องแชท
        </p>
    </div>

    <!-- 2. Tutorial State -->
    <div id="tutorialState" class="state-transition hidden h-full flex flex-col bg-white overflow-hidden">
        <div class="px-4 py-3 flex items-center justify-between border-b border-slate-50 shrink-0">
            <button onclick="backToSelection()"
                class="flex items-center space-x-1 text-slate-400 hover:text-blue-600 transition-colors">
                <i class="fa-solid fa-chevron-left text-sm"></i>
                <span class="text-xs font-bold" data-i18n="backBtn">กลับ</span>
            </button>
            <div class="flex items-center space-x-2">
                <img id="activePlatformIcon" src="" class="w-4 h-4 object-contain">
                <span id="platformTitle"
                    class="text-[10px] font-black text-slate-500 uppercase tracking-widest">PLATFORM</span>
            </div>
            <div class="w-8"></div>
        </div>

        <div class="h-1 bg-slate-50 w-full shrink-0">
            <div id="progressBar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="flex-grow flex flex-col overflow-hidden relative">
            <!-- Image Area -->
            <div
                class="relative flex-grow bg-slate-100 overflow-hidden flex items-center justify-center image-container">
                <!-- Loading Indicator -->
                <div id="imgLoader" class="absolute inset-0 flex items-center justify-center z-10 bg-slate-100">
                    <div class="loader"></div>
                </div>

                <!-- 
                     Transparent Pixel สำหรับล้าง Buffer รูปเก่า:
                     data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7
                -->
                <img id="currentImg"
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                    class="h-full w-full object-contain block" onload="onImageLoad()" onerror="onImageError(this)">

                <button onclick="prevStep()" id="arrowPrev"
                    class="arrow-btn absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full shadow-lg border border-slate-100 flex items-center justify-center text-slate-600">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <button onclick="nextStep()" id="arrowNext"
                    class="arrow-btn absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full shadow-lg border border-slate-100 flex items-center justify-center text-slate-600">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <!-- Description Area -->
            <div
                class="p-6 text-center bg-white border-t border-slate-50 shrink-0 min-h-[140px] flex flex-col justify-center">
                <div id="stepCounter" class="mb-2 text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em]">STEP 1
                    / 3</div>
                <p id="currentDesc"
                    class="text-slate-700 text-sm font-medium leading-relaxed px-4 transition-opacity duration-300"
                    data-i18n="loadingText">
                    กำลังโหลด...
                </p>
            </div>
        </div>

        <!-- 
            UX Fix: เปลี่ยนจาก class 'hidden' เป็นการใช้ 'invisible' และ 'opacity-0' 
            เพื่อให้ตัวกล่องจองพื้นที่ layout ไว้ล่วงหน้า 
            ความสูงของรูปภาพจะเท่าเดิมเสมอ ปุ่มลูกศรซ้ายขวาจึงไม่กระโดด 
        -->
        <div id="bottomAction" class="px-6 pb-6 pt-2 shrink-0 invisible opacity-0 transition-opacity duration-300">
            <!-- ไฮไลท์ข้อความเตือน (แสดงเฉพาะหน้าสุดท้าย) -->
            <div class="mb-4 p-3.5 bg-amber-50 border border-amber-200 rounded-xl flex items-start space-x-3 shadow-sm">
                <div class="text-amber-500 mt-0.5 shrink-0">
                    <i class="fa-solid fa-circle-exclamation text-base"></i>
                </div>
                <div class="text-amber-700 text-xs sm:text-sm font-semibold leading-relaxed text-left"
                    data-i18n="finalWarning">
                    สะสมคะแนนได้เฉพาะออเดอร์ที่ชำระเงินหรือจัดส่งเรียบร้อยแล้วเท่านั้น
                </div>
            </div>

            <button onclick="finishTutorial()"
                class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-emerald-100 active:scale-95 transition-all flex items-center justify-center space-x-2">
                <span data-i18n="understoodBtn">เข้าใจแล้ว เริ่มส่งรหัส</span>
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

    <script>
        // --- 1. Language Dictionary ---
        const i18nDict = {
            Th: {
                userGuide: "User Guide",
                mainTitle1: "ขั้นตอนวิธีการหา",
                mainTitle2: "หมายเลขคำสั่งซื้อ OrderId",
                subTitle: "กรุณาเลือกช่องทางที่คุณสั่งซื้อสินค้าครับ",
                footerNote: "*หากไม่พบหมายเลขคำสั่งซื้อ กรุณาติดต่อแอดมินผ่านช่องแชท",
                backBtn: "กลับ",
                understoodBtn: "เข้าใจแล้ว เริ่มส่งรหัส",
                loadingImg: "ไม่สามารถโหลดรูปภาพได้",
                loadingText: "กำลังโหลด...",
                finalWarning: "สะสมคะแนนได้เฉพาะออเดอร์ที่ชำระเงินหรือจัดส่งเรียบร้อยแล้วเท่านั้น",
                platforms: {
                    shopee: { label: "Shopee", sub: "ช้อปปี้" },
                    lazada: { label: "Lazada", sub: "ลาซาด้า" },
                    tiktok: { label: "TikTok Shop", sub: "ติ๊กต็อก" }
                },
                shopeeDesc: [
                    "เข้าแอป Shopee กดมาที่หน้า “ฉัน”",
                    "แล้วกดไปที่ ปุ่ม “ที่ต้องจัดส่ง”",
                    "เมื่อซื้อของเสร็จ ให้กดไปที่ปุ่ม สินค้าที่สั่งซื้อ",
                    "เลื่อนลงมาที่ “หมายเลขคำสั่งซื้อ” และกดคัดลอกได้เลย"
                ],
                lazadaDesc: [
                    "เมื่อซื้อของเสร็จ ให้กดไปที่ “รายละเอียดคำสั่งซื้อ” ที่อยู่ในกรอบวันที่สินค้าจัดส่ง",
                    "จะเจอหน้า “รายละเอียดคำสั่งซื้อ” เลื่อนลงมาด้านล่าง",
                    "จะพบ “หมายเลขคำสั่งซื้อ” และกดคัดลอกได้เลย"
                ],
                tiktokDesc: [
                    "เปิดแอป “TikTok” และกดที่เมนู Your Orders",
                    "ไปที่เมนู “To review” เพื่อไปที่รายการออเดอร์",
                    "เลื่อนหาสินค้าที่สั่งซื้อกับทางร้าน",
                    "จะเจอหน้ารายละเอียดคำสั่งซื้อ เลื่อนลงมาด้านล่าง",
                    "จะเจอ หมายเลขคำสั่งซื้อ หรือ Order number และกดคัดลอกรหัสได้เลย"
                ]
            },
            En: {
                userGuide: "User Guide",
                mainTitle1: "How to find",
                mainTitle2: "Order ID",
                subTitle: "Please select your purchasing platform",
                footerNote: "*If you cannot find the order ID, please contact the admin via chat.",
                backBtn: "Back",
                understoodBtn: "Understood, Start Sending",
                loadingImg: "Unable to load image",
                loadingText: "Loading...",
                finalWarning: "Points can only be earned from fully paid orders.",
                platforms: {
                    shopee: { label: "Shopee", sub: "Shopee" },
                    lazada: { label: "Lazada", sub: "Lazada" },
                    tiktok: { label: "TikTok Shop", sub: "TikTok" }
                },
                shopeeDesc: [
                    "Open the Shopee app and go to the 'Me' page.",
                    "Tap on 'To Ship' button.",
                    "After purchasing, tap on the ordered item.",
                    "Scroll down to 'Order SN' and tap to copy."
                ],
                lazadaDesc: [
                    "After purchasing, tap 'Order Details' in the delivery date box.",
                    "You will see the 'Order Details' page, scroll down.",
                    "Find 'Order Number' and tap to copy."
                ],
                tiktokDesc: [
                    "Open the 'TikTok' app and go to 'Your Orders'.",
                    "Go to the 'To review' menu to see your order list.",
                    "Scroll to find the item purchased from the store.",
                    "On the order details page, scroll down.",
                    "Find the 'Order number' and tap to copy."
                ]
            }
        };

        let config = { lang: "Th" }; // Default Language

        // --- 2. Configuration for Images (Text moved to Dict) ---
        const tutorialConfig = {
            platformLogos: {
                shopee: "res/platform/shopee.png",
                lazada: "res/platform/lazada.png",
                tiktok: "res/platform/tiktok.png"
            },
            tutorials: {
                shopee: [
                    { "img": "res/marketplace_tutorials/shopee/img1.png" },
                    { "img": "res/marketplace_tutorials/shopee/img2.png" },
                    { "img": "res/marketplace_tutorials/shopee/img3.png" },
                    { "img": "res/marketplace_tutorials/shopee/img4.png" }
                ],
                lazada: [
                    { "img": "res/marketplace_tutorials/lazada/img1.png" },
                    { "img": "res/marketplace_tutorials/lazada/img2.png" },
                    { "img": "res/marketplace_tutorials/lazada/img3.png" }
                ],
                tiktok: [
                    { "img": "res/marketplace_tutorials/tiktok/img1.png" },
                    { "img": "res/marketplace_tutorials/tiktok/img2.png" },
                    { "img": "res/marketplace_tutorials/tiktok/img3.png" },
                    { "img": "res/marketplace_tutorials/tiktok/img4.png" },
                    { "img": "res/marketplace_tutorials/tiktok/img5.png" }
                ]
            }
        };

        let currentPlatform = '';
        let currentStepIndex = 0;
        const TRANSPARENT_PIXEL = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

        // --- 3. Translation Helper ---
        function applyLanguage(langCode) {
            const dict = i18nDict[langCode] || i18nDict['Th'];

            // เปลี่ยน Text ตาม Attribute data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerHTML = dict[key];
            });

            // Re-render UI ถ้ากำลังแสดงอยู่
            renderPlatformSelection();
            if (document.getElementById('tutorialState').style.display === 'flex') {
                updateStepUI();
            }
        }

        function renderPlatformSelection() {
            const grid = document.getElementById('platformGrid');
            if (!grid) return;
            grid.innerHTML = '';

            const dict = i18nDict[config.lang] || i18nDict['Th'];

            const platforms = [
                { id: 'shopee', color: 'hover:border-orange-300', bg: 'bg-orange-50' },
                { id: 'lazada', color: 'hover:border-blue-300', bg: 'bg-blue-50' },
                { id: 'tiktok', color: 'hover:border-slate-800', bg: 'bg-slate-100' }
            ];

            platforms.forEach(p => {
                const label = dict.platforms[p.id].label;
                const sub = dict.platforms[p.id].sub;

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.onclick = () => startTutorial(p.id);
                btn.className = `platform-card w-full flex items-center p-5 bg-white rounded-3xl shadow-sm border border-slate-100 ${p.color} group`;
                btn.innerHTML = `
                    <div class="w-12 h-12 ${p.bg} rounded-2xl flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                        <img src="${tutorialConfig.platformLogos[p.id]}" class="w-8 h-8 object-contain" alt="${label}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/263/263142.png'">
                    </div>
                    <div class="text-left flex-grow">
                        <h3 class="font-bold text-slate-800 text-base leading-tight">${label}</h3>
                        <p class="text-[10px] text-slate-400 font-medium">${sub}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-200 text-xs"></i>
                `;
                grid.appendChild(btn);
            });
        }

        function startTutorial(platform) {
            if (!tutorialConfig.tutorials[platform]) return;
            currentPlatform = platform;
            currentStepIndex = 0;

            document.getElementById('selectionState').style.display = 'none';
            const tutState = document.getElementById('tutorialState');
            tutState.style.display = 'flex';
            tutState.classList.remove('hidden');

            document.getElementById('platformTitle').textContent = platform;
            document.getElementById('activePlatformIcon').src = tutorialConfig.platformLogos[platform];

            updateStepUI();
        }

        function backToSelection() {
            document.getElementById('tutorialState').style.display = 'none';
            document.getElementById('tutorialState').classList.add('hidden');
            document.getElementById('selectionState').style.display = 'flex';
        }

        function nextStep() {
            const steps = tutorialConfig.tutorials[currentPlatform];
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                updateStepUI();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateStepUI();
            }
        }

        function finishTutorial() {
            window.parent.postMessage({
                type: "formData",
                data: { tutorialPlatform: currentPlatform, finished: true },
                closeIframe: true
            }, "*");
        }

        function onImageLoad() {
            const img = document.getElementById('currentImg');
            const loader = document.getElementById('imgLoader');

            // หาก src เป็น transparent pixel ไม่ต้องทำอะไร (เป็นแค่การล้าง buffer)
            if (img.src === TRANSPARENT_PIXEL) return;

            // แสดงรูปภาพจริงพร้อม Animation
            img.classList.remove('no-transition');
            img.classList.add('loaded');

            // ซ่อนตัวโหลด
            loader.style.opacity = '0';
            setTimeout(() => { loader.classList.add('hidden'); }, 300);
        }

        function onImageError(img) {
            if (img.src === TRANSPARENT_PIXEL) return;
            const dict = i18nDict[config.lang] || i18nDict['Th'];
            img.src = `https://via.placeholder.com/600x800?text=${encodeURIComponent(dict.loadingImg)}`;
        }

        function updateStepUI() {
            const dict = i18nDict[config.lang] || i18nDict['Th'];
            const stepsImg = tutorialConfig.tutorials[currentPlatform];
            const stepsDesc = dict[`${currentPlatform}Desc`];

            const stepImg = stepsImg[currentStepIndex].img;
            const stepDesc = stepsDesc[currentStepIndex];
            const isLast = currentStepIndex === stepsImg.length - 1;

            const img = document.getElementById('currentImg');
            const desc = document.getElementById('currentDesc');
            const loader = document.getElementById('imgLoader');

            // 1. เอารูปเดิมออกทันทีโดยไม่มี transition (Instant Clear)
            img.classList.add('no-transition');
            img.classList.remove('loaded');
            // สำคัญ: เปลี่ยน src เป็น transparent pixel ทันทีเพื่อล้างภาพค้างใน buffer
            img.src = TRANSPARENT_PIXEL;

            // 2. แสดงตัวโหลด
            loader.classList.remove('hidden');
            loader.style.opacity = '1';

            // 3. จัดการ Text
            desc.style.opacity = '0';
            document.getElementById('stepCounter').textContent = `STEP ${currentStepIndex + 1} / ${stepsImg.length}`;

            // 4. หน่วงเวลาเล็กน้อยเพื่อให้ browser เคลียร์ buffer รูปเก่าเสร็จ แล้วจึงใส่รูปใหม่
            setTimeout(() => {
                img.src = stepImg;
                desc.textContent = stepDesc;
                desc.style.opacity = '1';
            }, 50);

            // 5. ปุ่มกด
            document.getElementById('arrowPrev').disabled = (currentStepIndex === 0);
            document.getElementById('arrowNext').disabled = isLast;

            // UX Fix: ใช้ invisible กับ opacity แทน hidden เพื่อรักษาตำแหน่ง Layout ไม่ให้รูปกระโดด
            const bottomAction = document.getElementById('bottomAction');
            if (isLast) {
                bottomAction.classList.remove('invisible', 'opacity-0', 'pointer-events-none');
                bottomAction.classList.add('opacity-100');
            } else {
                bottomAction.classList.add('invisible', 'opacity-0', 'pointer-events-none');
                bottomAction.classList.remove('opacity-100');
            }

            // 6. Progress Bar
            const progress = ((currentStepIndex + 1) / stepsImg.length) * 100;
            const bar = document.getElementById('progressBar');
            bar.style.width = `${progress}%`;
            bar.style.backgroundColor = isLast ? '#10b981' : '#3b82f6';
        }

        // --- Initialize ---
        applyLanguage(config.lang);

        // --- Event Listener รับค่า ---
        window.addEventListener('message', function (event) {
            if (event.data && event.data.type === 'initialData') {

                const data = event.data.data;
                const appData = window.parent.appData;
                const htmlCacheVersion = window.parent.htmlCacheVersion;

                // รับค่าภาษา
                if (appData.language && (appData.language === 'Th' || appData.language === 'En')) {
                    config.lang = appData.language;
                    applyLanguage(config.lang);
                }

                if (appData.customAssets?.shopeeHeader) tutorialConfig.platformLogos.shopee = appData.customAssets.shopeeHeader;
                else tutorialConfig.platformLogos.shopee = `${appData.resPath}/platform/shopee.png?v=${htmlCacheVersion}`;

                if (appData.customAssets?.lazadaHeader) tutorialConfig.platformLogos.lazada = appData.customAssets.lazadaHeader;
                else tutorialConfig.platformLogos.lazada = `${appData.resPath}/platform/lazada.png?v=${htmlCacheVersion}`;

                if (appData.customAssets?.tiktokHeader) tutorialConfig.platformLogos.tiktok = appData.customAssets.tiktokHeader;
                else tutorialConfig.platformLogos.tiktok = `${appData.resPath}/platform/tiktok.png?v=${htmlCacheVersion}`;

                // สั่งเปิด Tutorial จากภายนอก
                if (data.platform && tutorialConfig.tutorials[data.platform]) {
                    startTutorial(data.platform);
                }
            }
        }, false);
    </script>
</body>

</html>
