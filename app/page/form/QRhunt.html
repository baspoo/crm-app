<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR Hunt Activity</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- Tailwind Config for Dynamic Theming -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        secondary: 'var(--color-secondary)',
                        'primary-text': 'var(--color-primary-text)',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'bounce-slight': 'bounceSlight 2.5s infinite',
                        'pop-in': 'popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'shimmer': 'shimmer 2.5s infinite linear',
                        'confetti-fall-y': 'confettiFallY 4s linear infinite forwards',
                        'confetti-shake-x': 'confettiShakeX 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        },
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(-4%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
                            '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.85) translateY(12px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        },
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        },
                        confettiFallY: {
                            '0%': { transform: 'translateY(-10vh)', opacity: '1' },
                            '100%': { transform: 'translateY(110vh)', opacity: '0' },
                        },
                        confettiShakeX: {
                            '0%': { transform: 'translateX(0px) rotate(0deg)' },
                            '100%': { transform: 'translateX(20px) rotate(45deg)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* --- CSS Variables สำหรับ Theming (Default) --- */
        :root {
            --color-primary: #4f46e5; /* Modern Indigo */
            --color-secondary: #f59e0b; /* Amber Gold */
            --color-primary-text: #ffffff;
            --bg-body: #0b0f19; /* Deep Space Navy */
            
            /* --- ตัวแปรสำหรับปรับตำแหน่งเนื้อหาในหน้าอื่นๆ (หน้าสแกน และ หน้าสรุปผล) --- */
            --non-home-top-offset: 150px; 
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(79, 70, 229, 0.12) 0%, transparent 50%),
                radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 24px 24px;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* --- Smooth Custom Scrollbar --- */
        html, .custom-scroll {
            scrollbar-width: thin; 
            scrollbar-color: rgba(255,255,255,0.1) transparent; 
        }

        ::-webkit-scrollbar {
            width: 5px; 
            height: 5px; 
        }

        ::-webkit-scrollbar-track {
            background: transparent; 
        }

        ::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.15); 
            border-radius: 10px;
        }

        /* --- Professional Tactile Buttons (Smooth Press Effect) --- */
        .btn-game-primary {
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(79, 70, 229, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-game-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
        }

        .btn-game-secondary {
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-game-secondary:active {
            transform: scale(0.96);
        }

        /* --- Sci-Fi HUD Scanner viewport --- */
        .scanner-container {
            position: relative;
            overflow: hidden;
            border-radius: 2.25rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            box-shadow: 
                0 0 50px rgba(79, 70, 229, 0.2),
                inset 0 0 35px rgba(0, 0, 0, 0.95);
            aspect-ratio: 1 / 1; 
        }

        /* Scanner Target HUD Brackets */
        .hud-bracket {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--color-primary);
            z-index: 12;
            pointer-events: none;
            filter: drop-shadow(0 0 6px var(--color-primary));
        }
        .hud-tl { top: 35px; left: 35px; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 10px; }
        .hud-tr { top: 35px; right: 35px; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 10px; }
        .hud-bl { bottom: 35px; left: 35px; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 10px; }
        .hud-br { bottom: 35px; right: 35px; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 10px; }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border: 36px solid rgba(11, 15, 25, 0.7); 
            border-radius: 2.1rem;
            pointer-events: none;
            z-index: 10;
        }

        .scan-line {
            position: absolute;
            width: calc(100% - 72px);
            left: 36px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #10b981, transparent); 
            box-shadow: 0 0 14px #10b981, 0 0 5px #10b981;
            animation: scanning 2.2s infinite ease-in-out;
            z-index: 11;
        }

        @keyframes scanning {
            0% { top: 36px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: calc(100% - 39px); opacity: 0; }
        }

        /* Override library styles to fit beautifully */
        #qr-reader {
            border: none !important;
            background: #0b0f19 !important; 
        }
        #qr-reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 2.1rem !important;
        }
        #qr-reader img[alt="Info icon"] { display: none !important; }
        #qr-reader__dashboard_section_csr span { display: none !important; }
        
        /* Celebration Glow */
        .success-glow {
            box-shadow: 
                0 0 70px rgba(245, 158, 11, 0.25),
                inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }
        
        .bg-sunburst {
            background-image: repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0.03) 0deg 15deg, transparent 15deg 30deg);
        }

        /* Custom Glass Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Confetti Elements */
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            opacity: 0;
        }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-x-hidden overflow-y-auto text-slate-100 custom-scroll pb-6 safe-bottom">

    <!-- Dynamic Cover Background Layer (รองรับการเล่นวิดีโอหรือรูปภาพแบบยืดหยุ่นในส่วน Header) -->
    <div id="cover-bg-area" class="absolute top-0 left-0 right-0 h-[48dvh] min-h-[320px] overflow-hidden transition-all duration-500 ease-out z-0">
        
        <!-- ภาพ Header / ภาพ fallback สำรองในกรณีที่เล่นวิดีโอไม่ได้ -->
        <img id="headerImage" src="" class="absolute inset-0 w-full h-full object-cover transform scale-105 z-[-2] transition-opacity duration-500 ease-out" alt="Cover Banner">
        
        <!-- 1. แถบเบลนด์ขอบล่างแบบขนนกนุ่มนวลเป็นพิเศษ (Multi-Stage Feathered Gradient) เกลี่ยน้ำหนักสีให้เนียนตาขึ้น -->
        <div class="absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-t from-black/65 via-black/25 to-transparent backdrop-blur-[1px] z-10 pointer-events-none"></div>

        <!-- 2. Volumetric Ambient Glow (แสงออร่านีออนฟุ้งนุ่มนวล คาบเกี่ยวรอยตัดระหว่างวิดีโอกับพื้นหลังให้เบลนด์สนิทกัน และกะพริบมีชีวิตชีวาตามสีหลักแอปพลิเคชัน) -->
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[140%] h-24 z-10 pointer-events-none opacity-45 blur-[30px] animate-pulse" style="background: radial-gradient(circle, var(--color-primary) 0%, transparent 10%); animation-duration: 4s;"></div>

        <!-- 3. Glowing Futuristic Energy Line (เส้นแสงไซไฟพลังงานบางเฉียบ นำสายตาเพื่อตัดแสงแข็งของขอบวิดีโออย่างสมบูรณ์แบบ) -->
        <div class="absolute bottom-0 left-0 right-0 h-[2px] z-10 pointer-events-none opacity-85" style="background: linear-gradient(to right, transparent, var(--color-primary) 50%, transparent);"></div>

        <!-- ไล่โทนเฟดเต็มผืนสำหรับหน้าอื่นๆ เพื่อความกลมกลืน (สลับความโปร่งใสในหน้าแรก/หน้าอื่นๆ ผ่าน JS) -->
        <div id="header-gradient-fade" class="absolute inset-0 bg-gradient-to-b from-transparent via-[#0b0f19]/60 to-[#0b0f19] z-11 transition-opacity duration-500"></div>
        <!-- ฟิลเตอร์ปรับความมืดอัตโนมัติเมื่อกดไปสแกนและสรุปแต้ม -->
        <div id="cover-dim-overlay" class="absolute inset-0 bg-slate-950/0 transition-all duration-500 z-20"></div>
    </div>

 

    <!-- Main Content Area -->
    <main class="flex-1 w-full max-w-md mx-auto px-6 py-3 flex flex-col items-center justify-start relative z-10 mt-0">

        <!-- ================= VIEW 1: HOME ================= -->
        <div id="view-home" class="w-full flex flex-col items-center justify-end flex-1 animate-pop-in py-6">
            
            <!-- Branding Content -->
            <div class="text-center w-full mb-10 mt-auto">
                <!-- Premium Dynamic Icon Ring -->
                <div class="relative w-28 h-28 flex items-center justify-center animate-float mx-auto mb-6">
                    <div class="absolute inset-0 bg-primary opacity-30 rounded-full blur-2xl"></div>
                    <div class="absolute inset-0 bg-gradient-to-tr from-primary to-indigo-500 rounded-[2rem] transform rotate-6 opacity-100"></div>
                    <div class="relative w-20 h-20 bg-slate-900/90 backdrop-blur-md p-4.5 rounded-[1.6rem] shadow-2xl border border-white/10 flex items-center justify-center">
                        <i data-lucide="qr-code" class="w-10 h-10 text-primary drop-shadow-[0_0_8px_rgba(79,70,229,0.5)]"></i>
                    </div>
                </div>

                <!-- Main Title with Clean Gradient -->
                <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-100 to-slate-400 tracking-tight drop-shadow-md pb-1.5" data-i18n="homeTitle">
                    ตามล่าหา QR Code
                </h1>
                
                <!-- Sleek & Simple Campaign Subtitle -->
                <p class="text-slate-300 text-sm mt-3 font-medium max-w-[85%] mx-auto leading-relaxed" data-i18n="homeDesc">
                    สแกน QR Code ตามจุดต่างๆ เพื่อรับคะแนนสะสมและของรางวัลพิเศษ!
                </p>
            </div>

            <!-- Huge Tactile Start Button -->
            <button onclick="startScanning()" class="w-full py-5 px-8 rounded-2xl bg-gradient-to-b from-primary to-indigo-700 text-primary-text font-black text-2xl btn-game-primary flex items-center justify-center gap-4 border border-white/25 shadow-[0_12px_35px_rgba(79,70,229,0.45)] hover:shadow-[0_16px_40px_rgba(79,70,229,0.55)] transition-all">
                <i data-lucide="scan-line" class="w-7 h-7 animate-pulse"></i>
                <span data-i18n="btnStart">เริ่มสแกนเลย</span>
            </button>
        </div>

        <!-- ================= VIEW 2: SCANNER ================= -->
        <div id="view-scanner" class="w-full flex flex-col items-center justify-center hidden animate-pop-in py-2">
            
            <!-- Guidance Header -->
            <div class="text-center mb-4 mt-2">
                <div class="glass-panel inline-flex items-center gap-2.5 px-6 py-3 rounded-full shadow-lg">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                    <h2 class="font-bold text-sm text-slate-200 tracking-wide" data-i18n="scanTitle">หันกล้องไปที่ QR Code</h2>
                </div>
            </div>

            <!-- Scanner Viewport -->
            <div class="w-[92%] max-w-[320px] scanner-container bg-slate-950 relative my-2 mx-auto">
                <div class="absolute inset-0 rounded-[2rem] border border-white/5 pointer-events-none z-10 shadow-inner"></div>
                
                <!-- HUD brackets -->
                <div class="hud-bracket hud-tl"></div>
                <div class="hud-bracket hud-tr"></div>
                <div class="hud-bracket hud-bl"></div>
                <div class="hud-bracket hud-br"></div>
                
                <!-- Output camera window -->
                <div id="qr-reader" class="w-full h-full"></div>
                
                <!-- Laser Line and Overlay -->
                <div class="scan-overlay"></div>
                <div class="scan-line"></div>
            </div>

            <!-- Cancel button directly underneath -->
            <button onclick="cancelScanning()" class="w-[92%] max-w-[320px] py-4 rounded-2xl bg-slate-900/90 text-slate-300 font-bold text-base btn-game-secondary flex items-center justify-center gap-2 hover:bg-slate-800 border border-white/10 mt-6">
                <i data-lucide="x-circle" class="w-5 h-5 text-rose-500"></i>
                <span>Stop Scanning</span>
            </button>
        </div>

        <!-- ================= VIEW 3: LOADING ================= -->
        <div id="view-loading" class="w-full flex flex-col items-center justify-center flex-1 hidden animate-pop-in my-auto">
            <div class="relative w-28 h-28 mb-8 flex items-center justify-center">
                <!-- Outer spinning frame -->
                <div class="absolute inset-0 border-[3px] border-slate-800 rounded-[2rem] transform rotate-12"></div>
                <div class="absolute inset-0 border-[3px] border-t-primary border-r-primary rounded-[2rem] border-b-transparent border-l-transparent animate-spin-slow"></div>
                
                <div class="absolute inset-0 flex items-center justify-center text-primary">
                    <i data-lucide="radar" class="w-10 h-10 animate-pulse-fast drop-shadow-[0_0_10px_rgba(79,70,229,0.5)]"></i>
                </div>
            </div>
            
            <h2 class="text-2xl font-black text-slate-100" data-i18n="loadingTitle">กำลังตรวจสอบ...</h2>
            <p class="text-slate-400 text-xs font-semibold mt-2 bg-slate-900/50 border border-white/5 px-4 py-1.5 rounded-full" data-i18n="loadingDesc">กรุณารอสักครู่</p>
        </div>

        <!-- ================= VIEW 4: RESULT (Success & Error Redesigned) ================= -->
        <div id="view-result" class="w-full flex flex-col items-center justify-center hidden animate-pop-in w-full max-w-sm py-2 relative">
            
            <!-- Confetti system inside results wrapper -->
            <div id="confetti-container" class="absolute inset-0 pointer-events-none z-30 overflow-hidden rounded-[2.5rem]"></div>
            
            <!-- Elevated Card Layout -->
            <div id="result-card" class="w-full glass-panel rounded-[2rem] p-6 shadow-[0_24px_50px_-12px_rgba(0,0,0,0.5)] flex flex-col items-center relative overflow-hidden mb-5 transition-all duration-300">
                
                <!-- Sunburst rotation -->
                <div id="sunburst-bg" class="absolute top-1/2 left-1/2 w-[220%] h-[220%] -translate-x-1/2 -translate-y-1/2 bg-sunburst z-[-1] opacity-30"></div>

                <!-- Premium Floating Dynamic Icon Ring -->
                <div id="result-icon-container" class="relative w-20 h-20 rounded-full flex items-center justify-center mb-4 z-10 transition-all duration-300">
                    <div class="absolute inset-0 rounded-full bg-white opacity-5 animate-ping"></div>
                    <i id="result-icon" data-lucide="trophy" class="w-9 h-9"></i>
                    
                    <!-- Sparkles decoration -->
                    <i id="sparkle-1" data-lucide="sparkles" class="absolute -top-1 -right-1 w-6 h-6 text-yellow-400 hidden animate-pulse"></i>
                    <i id="sparkle-2" data-lucide="sparkle" class="absolute -bottom-1 -left-1 w-5 h-5 text-amber-300 hidden animate-bounce-slight"></i>
                </div>

                <!-- Clean Styled Header Title -->
                <h2 id="result-title" class="text-2xl font-black mb-3.5 z-10 text-center tracking-tight">ยอดเยี่ยม!</h2>

                <!-- Success Box structure -->
                <div id="result-data-box" class="w-full flex flex-col items-center justify-center z-10 hidden">
                    
                    <!-- Reward counter badge -->
                    <div class="bg-white/5 border border-white/10 rounded-xl p-4 w-full text-center mb-4 shadow-inner">
                        <span class="text-amber-400 text-[10px] font-extrabold uppercase tracking-widest block mb-1" data-i18n="earnedPoints">แต้มที่ได้รับ</span>
                        <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white via-yellow-300 to-amber-500 animate-bounce-slight" id="res-earned">
                            +0
                        </div>
                    </div>

                    <!-- Balance indicator with custom dark transparent elegant board -->
                    <div class="bg-slate-950/65 border border-white/5 px-4 py-3 rounded-xl w-full flex items-center justify-between shadow-inner">
                        <span class="text-slate-400 font-bold text-xs uppercase tracking-wide" data-i18n="totalPoints">แต้มสะสมทั้งหมด</span>
                        <div class="flex items-center gap-1 bg-white/5 px-2.5 py-1 rounded-lg border border-white/10">
                            <i data-lucide="coins" class="w-4 h-4 text-amber-500"></i>
                            <span class="text-lg font-black text-slate-200" id="res-total">0</span>
                        </div>
                    </div>
                </div>

                <!-- Error Box structure -->
                <div id="error-note-box" class="w-full flex flex-col items-center justify-center z-10 hidden mt-1">
                    <div class="bg-amber-500/5 border border-amber-500/10 px-5 py-5 rounded-2xl text-center w-full shadow-lg">
                        <span id="error-subtitle" class="text-amber-200 text-sm font-semibold block" data-i18n="errSubtitle">ลองหาจุดอื่นสแกนดูนะ</span>
                    </div>
                </div>

            </div>

            <!-- Done Action Button -->
            <button onclick="resetToHome()" class="w-full py-5 px-8 rounded-2xl bg-gradient-to-b from-slate-800 via-slate-900 to-slate-950 text-slate-100 font-extrabold text-xl btn-game-secondary flex items-center justify-center gap-3 border border-white/15 shadow-[0_12px_30px_rgba(0,0,0,0.6)] active:scale-95 transition-all">
                <span data-i18n="btnDone">รับรางวัล & ไปต่อ</span>
                <i data-lucide="arrow-right" class="w-6 h-6 text-primary"></i>
            </button>
        </div>

    </main>

    <!-- Custom Modal Alert (แทนการใช้ Browser alert() เพื่อความปลอดภัยและความสวยงามระดับพรีเมียม) -->
    <div id="custom-alert-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md hidden animate-pop-in">
        <div class="glass-panel w-full max-w-sm rounded-[2.5rem] p-6 border border-white/10 flex flex-col items-center shadow-2xl">
            <div class="w-16 h-16 rounded-full bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-500 mb-4 animate-bounce-slight">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 id="alert-title" class="text-xl font-black text-slate-100 mb-2 tracking-tight">ข้อผิดพลาด</h3>
            <p id="alert-message" class="text-slate-300 text-sm text-center mb-6 leading-relaxed">ไม่สามารถเข้าถึงกล้องได้</p>
            <button onclick="closeAlertModal()" class="w-full py-4 px-6 rounded-2xl bg-gradient-to-b from-slate-800 to-slate-900 hover:from-slate-700 hover:to-slate-800 text-white font-extrabold transition-all border border-white/10 shadow-lg active:scale-95">
                ตกลง
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. STATE & DICTIONARY
        // ==========================================
        let currentLang = 'th';
        let currentResPath = 'res';
        let html5QrcodeScanner = null;
        let isProcessing = false; 
        const apiName = "crm_qrHunt";

        // Dictionary (i18n)
        const translations = {
            th: {
                homeTitle: "ตามล่าหา QR Code",
                homeDesc: "สแกน QR Code ตามจุดต่างๆ \nเพื่อรับคะแนนสะสมและของรางวัลพิเศษ!",
                btnStart: "เริ่มสแกนเลย",
                scanTitle: "หันกล้องไปที่ QR Code",
                scanHint: "กำลังค้นหา QR Code ในกรอบ...",
                loadingTitle: "กำลังตรวจสอบ...",
                loadingDesc: "กรุณารอสักครู่",
                earnedPoints: "แต้มที่ได้รับ",
                totalPoints: "แต้มสะสมทั้งหมด",
                btnDone: "รับรางวัล & ไปต่อ",
                btnDoneErr: "ลองใหม่อีกครั้ง",
                errTitle: "ไม่พบ QR Code แฮะ",
                errSubtitle: "ลองหาจุดอื่นสแกนดูนะ",
                errTitleUsed: "สแกนไปแล้ว!",
                errSubUsed: "QR Code นี้ถูกใช้งานไปแล้ว",
                successTitle: "สแกนสำเร็จ!",
                cameraErrTitle: "ไม่สามารถเข้าถึงกล้องได้",
                cameraErrDesc: "กรุณาตรวจสอบสิทธิ์และอนุญาตให้แอปพลิเคชันเข้าถึงกล้องถ่ายภาพของคุณ"
            },
            en: {
                homeTitle: "QR Code Hunt",
                homeDesc: "Scan QR codes around the event to earn points and special rewards!",
                btnStart: "Start Scanning",
                scanTitle: "Point camera at QR Code",
                scanHint: "Looking for QR code...",
                loadingTitle: "Verifying...",
                loadingDesc: "Please wait",
                earnedPoints: "Points Earned",
                totalPoints: "Total Points",
                btnDone: "Collect & Continue",
                btnDoneErr: "Try Again",
                errTitle: "QR Code Not Found",
                errSubtitle: "Try scanning another spot.",
                errTitleUsed: "Already Scanned!",
                errSubUsed: "This QR Code has already been used.",
                successTitle: "Completed!",
                cameraErrTitle: "Camera Access Denied",
                cameraErrDesc: "Please allow camera access in your device settings to begin scanning."
            }
        };

        // Initialize Lucide Icons
        lucide.createIcons();

        // ==========================================
        // 2. PARENT MESSAGE HANDLER & THEME LOGIC
        // ==========================================
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'initialData') {

                const data = event.data.data;
                const appData = window.parent.appData; 
                const htmlCacheVersion = window.parent.htmlCacheVersion;
                
                if (appData.primaryColor) {
                    document.documentElement.style.setProperty('--color-primary', appData.primaryColor);
                    const textColor = getContrastYIQ(appData.primaryColor);
                    document.documentElement.style.setProperty('--color-primary-text', textColor);
                }
                
                if (appData.secondaryColor) {
                    document.documentElement.style.setProperty('--color-secondary', appData.secondaryColor);
                }

                if (appData.language && translations[appData.language.toLowerCase()]) {
                    currentLang = appData.language.toLowerCase();
                    applyLanguage(currentLang);
                }

                // --- ส่วนการจัดการมีเดียสำหรับ Header (รองรับวิดีโอ MP4 และ รูปภาพ PNG) ---
                if (appData.resPath) {

                    currentResPath = appData.resPath || 'res';
                    const imgEl = document.getElementById('headerImage');    
                    if(appData.customAssets?.qrhuntHeader) imgEl.src = appData.customAssets.qrhuntHeader;
                    else imgEl.src = `${currentResPath}/header/qrhunt.png?v=${htmlCacheVersion}`;
                    imgEl.style.display = "block";
                    // ทำให้เกิดเอฟเฟกต์เฟดนุ่มๆ สลับหน้าจอ
                    imgEl.style.opacity = "0";
                    setTimeout(() => {
                        imgEl.style.opacity = "1";
                    }, 50);
                    
                }
            }
        }, false);

        function getContrastYIQ(hexcolor) {
            hexcolor = hexcolor.replace("#", "");
            if (hexcolor.length === 3) hexcolor = hexcolor.split('').map(c => c+c).join('');
            const r = parseInt(hexcolor.substr(0,2),16);
            const g = parseInt(hexcolor.substr(2,2),16);
            const b = parseInt(hexcolor.substr(4,2),16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? '#0f172a' : '#ffffff'; 
        }

        function applyLanguage(lang) {
            const dict = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.innerText = dict[key];
                }
            });
            const btnDone = document.querySelector('[data-i18n="btnDone"]');
            if(btnDone && document.getElementById('error-note-box') && !document.getElementById('error-note-box').classList.contains('hidden')){
                 btnDone.innerText = dict['btnDoneErr'];
            }
        }

        // ==========================================
        // 3. CUSTOM MODAL LOGIC (แทนการใช้ Alert)
        // ==========================================
        function triggerAlert(title, message) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            document.getElementById('custom-alert-modal').classList.remove('hidden');
            lucide.createIcons(); // โหลดไอคอนแจ้งเตือนไซไฟ
        }

        function closeAlertModal() {
            document.getElementById('custom-alert-modal').classList.add('hidden');
        }

        // ==========================================
        // 4. UI VIEW CONTROLLERS
        // ==========================================
        function updateHeaderTransition(viewId) {
            const coverBg = document.getElementById('cover-bg-area');
            const dimOverlay = document.getElementById('cover-dim-overlay');
            const gradientFade = document.getElementById('header-gradient-fade');
            const mainContent = document.querySelector('main');
            
            if (viewId === 'view-home') {
                coverBg.style.height = '48dvh';
                coverBg.style.minHeight = '320px';
                dimOverlay.className = "absolute inset-0 bg-slate-950/20 transition-all duration-500 z-20";
                
                // ถ้านี่คือหน้าแรก (view-home) ให้นำ Fade สีดำออก (ตั้งความโปร่งแสงเป็น 0)
                if (gradientFade) {
                    gradientFade.classList.add('opacity-0');
                    gradientFade.classList.remove('opacity-100');
                }
                
                mainContent.style.marginTop = '0px';
            } else {
                coverBg.style.height = '48dvh';
                coverBg.style.minHeight = '320px';
                dimOverlay.className = "absolute inset-0 bg-slate-950/92 transition-all duration-500 z-20";
                
                // สำหรับหน้าสแกน/หน้าสรุปแต้ม ให้แสดงแถบไล่เฉดสีดำกลับมาเพื่อความกลมกลืนกับ Background
                if (gradientFade) {
                    gradientFade.classList.remove('opacity-0');
                    gradientFade.classList.add('opacity-100');
                }
                
                mainContent.style.marginTop = 'var(--non-home-top-offset)';
            }
        }

        function hideAllViews() {
            ['view-home', 'view-scanner', 'view-loading', 'view-result'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }

        function showView(viewId) {
            hideAllViews();
            document.getElementById(viewId).classList.remove('hidden');
            updateHeaderTransition(viewId);
        }

        function resetToHome() {
            isProcessing = false;
            document.getElementById('confetti-container').innerHTML = '';
            showView('view-home');
        }

        // ==========================================
        // 5. QR SCANNER LOGIC
        // ==========================================
        async function startScanning() {
            showView('view-scanner');
            isProcessing = false;

            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
            }

            const config = { fps: 12, aspectRatio: 1.0 };

            try {
                await html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure);
            } catch (err) {
                console.error("Camera start error:", err);
                // เรียกใช้ custom alert สไตล์พรีเมียมแทน browser alert
                triggerAlert(translations[currentLang].cameraErrTitle, translations[currentLang].cameraErrDesc);
                resetToHome();
            }
        }

        function cancelScanning() {
            if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                html5QrcodeScanner.stop().then(() => {
                    resetToHome();
                }).catch(err => {
                    console.error("Stop failed: ", err);
                    resetToHome();
                });
            } else {
                resetToHome();
            }
        }

        // ตัวเล่นเมื่อตรวจพบคิวอาร์โค้ด
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            isProcessing = true;

            if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                html5QrcodeScanner.stop().catch(console.error);
            }

            showView('view-loading');
            callApiRequest(decodedText);
        }

        function onScanFailure(error) {
            // Silence background scanner exceptions
        }

        // ==========================================
        // 6. API CALL LOGIC
        // ==========================================
        function callApiRequest(scannedCode) {
            const payload = { code: scannedCode };

            if (window.parent && typeof window.parent.callExternalApi === 'function') {
                window.parent.callExternalApi(apiName, payload, (res) => {
                    console.log("API response:", res);
                    handleApiResponse(res);
                });
            } else {
                // Mock responses for Canvas testing with 70% Success Rate
                console.warn("Parent API not found. Using simulation.");
                setTimeout(() => {
                    const rand = Math.random();
                    if (rand > 0.4) {
                        handleApiResponse({"result":{"code":200,"message":"OK","data":{"item_id":3,"earnPoint":50,"points":1890}}});
                    } else if (rand > 0.2) {
                        // จำลอง Code 10006: สแกนซ้ำไปแล้ว
                        handleApiResponse({"result": {"code": 10006, "message": "Already used", "note": "used", "data": {}}});
                    } else {
                        // จำลอง Code 10005: QR ไม่ถูกต้อง
                        handleApiResponse({"result": {"code": 10005, "message": "data not available", "note": "missing code", "data": {}}});
                    }
                }, 1500); 
            }
        }

        // Confetti Engine for Premium Celebration
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#f59e0b', '#fbbf24', '#eab308', '#3b82f6', '#4f46e5', '#10b981'];
            
            for (let i = 0; i < 28; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece animate-confetti-fall-y';
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.backgroundColor = color;
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                
                confetti.classList.add('animate-confetti-shake-x');
                
                const sizeW = Math.random() * 8 + 6;
                const sizeH = Math.random() * 14 + 10;
                confetti.style.width = sizeW + 'px';
                confetti.style.height = sizeH + 'px';
                confetti.style.animationDelay = (Math.random() * 1.5) + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 1.8) + 's';
                confetti.style.borderRadius = (Math.random() > 0.5 ? '50%' : '3px');
                
                container.appendChild(confetti);
            }
        }

        function handleApiResponse(res) {
            showView('view-result');
            
            const cardEl = document.getElementById('result-card');
            const iconContainer = document.getElementById('result-icon-container');
            const iconEl = document.getElementById('result-icon');
            const titleEl = document.getElementById('result-title');
            const sunburstBg = document.getElementById('sunburst-bg');
            
            const dataBox = document.getElementById('result-data-box');
            const errorBox = document.getElementById('error-note-box');
            const btnDoneTxt = document.querySelector('[data-i18n="btnDone"]');

            if (res && res.result && res.result.code === 200) {
                // === SUCCESS: GLORIOUS GOLD RADIAL THEME ===
                const data = res.result.data;
                
                cardEl.className = "w-full bg-slate-900/95 rounded-[2rem] p-6 shadow-[0_24px_60px_rgba(245,158,11,0.2)] border-2 border-yellow-500/55 flex flex-col items-center relative overflow-hidden mb-5 transform-gpu isolation-isolate z-0 success-glow animate-pop-in";
                sunburstBg.className = "absolute top-1/2 left-1/2 w-[220%] h-[220%] -translate-x-1/2 -translate-y-1/2 bg-sunburst z-[-1] opacity-35";
                
                iconContainer.className = "relative w-20 h-20 rounded-full flex items-center justify-center mb-4 shadow-[0_10px_35px_rgba(245,158,11,0.5)] z-10 border-4 border-white/20 bg-gradient-to-tr from-yellow-500 via-amber-400 to-yellow-300";
                iconEl.setAttribute('data-lucide', 'trophy');
                iconEl.className = "w-9 h-9 text-slate-950 drop-shadow-md";
                
                document.getElementById('sparkle-1').classList.remove('hidden');
                document.getElementById('sparkle-2').classList.remove('hidden');
                
                titleEl.innerText = translations[currentLang].successTitle;
                titleEl.className = "text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-amber-300 to-yellow-400 mb-4 z-10 text-center drop-shadow-md";
                
                document.getElementById('res-earned').innerText = `+${data.earnPoint || 0}`;
                document.getElementById('res-total').innerText = data.points || 0;
                
                btnDoneTxt.innerText = translations[currentLang].btnDone;

                dataBox.classList.remove('hidden');
                errorBox.classList.add('hidden');

                createConfetti();

                if(window.parent && typeof window.parent.onUpdateApp === 'function') {
                    window.parent.onUpdateApp();
                }

            } else {
                // === FAILED: CLEAN GENTLE DARK GHOST THEME ===
                cardEl.className = "w-full bg-slate-900/95 rounded-[2rem] p-6 shadow-[0_24px_50px_rgba(147,51,234,0.12)] border-2 border-slate-700/60 flex flex-col items-center relative overflow-hidden mb-5 transform-gpu isolation-isolate z-0 animate-pop-in";
                sunburstBg.className = "hidden";
                
                iconContainer.className = "relative w-26 h-26 rounded-full flex items-center justify-center mb-4 shadow-[0_8px_30px_rgba(147,51,234,0.25)] z-10 border-4 border-slate-700 bg-slate-800/80 mt-2";
                
                // --- เพิ่มการเช็ค Error Codes 10005 และ 10006 ---
                let errorTitle = translations[currentLang].errTitle;
                let errorSubtitle = translations[currentLang].errSubtitle;
                let errorIcon = 'ghost';

                if (res && res.result) {
                    if (res.result.code === 10006) {
                        // โค้ดถูกใช้ไปแล้ว
                        errorTitle = translations[currentLang].errTitleUsed;
                        errorSubtitle = translations[currentLang].errSubUsed;
                        errorIcon = 'info'; // เปลี่ยนไอคอนให้เข้ากับบริบทการแจ้งเตือน
                    } else {
                        // โค้ด 10005 หรืออื่นๆ ใช้ข้อความเดิม
                        errorIcon = 'ghost';
                    }
                }

                iconEl.setAttribute('data-lucide', errorIcon); 
                iconEl.className = "w-13 h-13 text-slate-300 animate-float";
                
                document.getElementById('sparkle-1').classList.add('hidden');
                document.getElementById('sparkle-2').classList.add('hidden');
                
                titleEl.innerText = errorTitle;
                titleEl.className = "text-xl font-bold text-slate-300 mb-4 z-10 text-center";
                
                btnDoneTxt.innerText = translations[currentLang].btnDoneErr;

                // ใส่ข้อความ Subtitle ให้ถูกต้อง
                document.getElementById('error-subtitle').innerText = errorSubtitle;

                dataBox.classList.add('hidden');
                errorBox.classList.remove('hidden');
            }

            // Re-render dynamically updated icons
            lucide.createIcons();
        }

        // Initialize Language on load
        applyLanguage(currentLang);
        // Set up initial view transitions
        updateHeaderTransition('view-home');

    </script>
</body>
</html>
