        .text-gray-600 { color: #4b5563; }
        .text-gray-700 { color: #374151; }
        .text-gray-800 { color: #1f2937; }
        .bg-white { background-color: #ffffff; }
        .bg-gray-50 { background-color: #f9fafb; }
        .bg-gray-100 { background-color: #f3f4f6; }
        .bg-gray-900\/90 { background-color: rgb(17 24 39 / 0.9); }
        .bg-slate-900\/80 { background-color: rgb(15 23 42 / 0.8); }
        .bg-emerald-500 { background-color: #10b981; }
        .bg-emerald-500\/20 { background-color: rgb(16 185 129 / 0.2); }
        
        .bg-gradient-to-t { background-image: linear-gradient(to top, var(--tw-gradient-stops)); }
        .from-slate-900\/90 { --tw-gradient-from: rgb(15 23 42 / 0.9) var(--tw-gradient-from-position); --tw-gradient-to: rgb(15 23 42 / 0) var(--tw-gradient-to-position); --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }

        .from-slate-50 { --tw-gradient-from: #f8fafc var(--tw-gradient-from-position); --tw-gradient-to: rgb(248 250 252 / 0) var(--tw-gradient-to-position); --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }

        .border-gray-100 { border-color: #f3f4f6; }
        .border-gray-200 { border-color: #e5e7eb; }
        .border-emerald-400\/30 { border-color: rgb(52 211 153 / 0.3); }

        .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .shadow-xl { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
        .shadow-inner { box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05); }

        .drop-shadow-md { filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)) drop-shadow(0 2px 2px rgb(0 0 0 / 0.06)); }

        .opacity-90 { opacity: 0.9; }
        .backdrop-blur-sm { backdrop-filter: blur(4px); }
        .backdrop-blur-md { backdrop-filter: blur(12px); }

        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .transition-opacity { transition-property: opacity; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .duration-500 { transition-duration: 500ms; }
        .hover\:bg-gray-200:hover { background-color: #e5e7eb; }

        .overflow-hidden { overflow: hidden; }
        .object-cover { object-fit: cover; }
        
        button { background: transparent; border: none; cursor: pointer; font-family: inherit; }

        html { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-active { color: var(--primary) !important; border-bottom: 3px solid var(--primary); }
        .btn-primary { background-color: var(--primary); color: var(--primary-text); transition: opacity 0.2s ease; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-disabled { background-color: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }
        .text-primary { color: var(--primary) !important; }
        .modal-enter { animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

</head>
<body class="min-h-screen pb-24">

    <div class="w-full bg-white shadow-sm">
        <img id="headerImage" 
         src="res/header/dummy.png" 
         onerror="this.onerror=null; this.src='https://via.placeholder.com/800x200?text=Banner'" 
         alt="Campaign Banner" 
         class="w-full h-auto block object-cover max-h-48">    
    </div>

    <div class="max-w-xl mx-auto px-4 mt-6">
        
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 mb-6">
            <div class="aspect-video w-full overflow-hidden bg-gray-100 relative group">
                <img id="rewardImage" src="res/header/dummy.png" alt="Reward" class="w-full h-full object-cover">
                
                <div id="usedOverlay" class="hidden absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/30 to-transparent flex items-end transition-opacity duration-500">
                    <div class="p-5 w-full flex items-center gap-3">
                        <div class="bg-emerald-500/20 backdrop-blur-md rounded-full p-1.5 border border-emerald-400/30 shadow-sm">
                            <div class="bg-emerald-500 rounded-full p-1 shadow-inner">
                                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </div>
                        <span class="text-white font-semibold tracking-wide text-lg drop-shadow-md" data-i18n="statusUsed">ใช้งานแล้ว</span>
                    </div>
                </div>
            </div>

            <div class="p-6">
                <h1 id="rewardName" class="text-xl font-bold text-gray-800 leading-tight">ของรางวัล</h1>
                <div class="flex flex-col gap-2 mt-4">
                    <div class="flex items-center text-sm text-gray-500">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span data-i18n="redeemedOn">แลกรับเมื่อ: </span>
                        <span id="redeemedAt" class="ml-1 font-medium text-gray-700">--/--/----</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="flex border-b border-gray-100">
                <button onclick="switchTab('details')" id="tabDetails" class="flex-1 py-4 text-center text-sm font-semibold tab-active transition-all" data-i18n="tabDetails">รายละเอียด</button>
                <button onclick="switchTab('terms')" id="tabTerms" class="flex-1 py-4 text-center text-sm font-semibold text-gray-400 transition-all" data-i18n="tabTerms">เงื่อนไข</button>
            </div>
            
            <div class="p-6 min-h-[150px]">
                <div id="contentDetails" class="text-gray-600 text-sm leading-relaxed whitespace-pre-line">
                    <p id="rewardDescription" data-i18n="loadingDetails">กำลังโหลดรายละเอียด...</p>
                </div>
                <div id="contentTerms" class="hidden text-gray-600 text-sm leading-relaxed whitespace-pre-line">
                    <p id="termsConditions" data-i18n="loadingTerms">กำลังโหลดเงื่อนไขการใช้งาน...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
        <div class="max-w-xl mx-auto">
            <button id="actionBtn" onclick="handleActionBtnClick()" class="w-full btn-primary py-4 px-6 rounded-2xl font-bold shadow-xl shadow-slate-200/50 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                <svg id="actionBtnIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                <span id="actionBtnText" data-i18n="showCouponBtn">แสดงรหัสคูปอง</span>
            </button>
        </div>
    </div>

    <div id="couponModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] w-full max-w-xl mx-auto modal-enter overflow-hidden relative">
            <div class="flex items-center relative p-6 border-b border-gray-50">
                <button onclick="closeCouponModal()" class="p-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors absolute left-6">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h3 class="text-lg font-bold text-gray-800 w-full text-center" data-i18n="modalTitle">รหัสคูปองของคุณ</h3>
            </div>

            <div class="p-8 flex flex-col items-center text-center">
                <div class="flex bg-gray-100 p-1 rounded-xl mb-8 w-full">
                    <button onclick="setCouponMode('text')" id="modeText" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-primary bg-white shadow-sm" data-i18n="modeText">ข้อความ</button>
                    <button onclick="setCouponMode('qr')" id="modeQR" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-gray-500" data-i18n="modeQR">QR Code</button>
                    <button onclick="setCouponMode('barcode')" id="modeBarcode" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-gray-500" data-i18n="modeBarcode">Barcode</button>
                </div>

                <div class="flex items-center justify-center h-[320px] w-full bg-gray-50 rounded-2xl border border-dashed border-gray-200 p-4 overflow-hidden">
                    <div id="displayContainerText" class="w-full">
                        <p class="text-xs text-gray-400 mb-2 uppercase tracking-widest font-semibold" data-i18n="yourCode">Your Code</p>
                        <p id="couponCodeText" class="text-4xl font-black text-gray-800 tracking-tighter select-all">--------</p>
                        <button onclick="copyToClipboard()" class="mt-6 text-sm font-bold flex items-center justify-center mx-auto space-x-1 p-2 rounded-xl transition-colors hover:bg-slate-200/50 text-primary">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            <span data-i18n="copyBtn">คัดลอกรหัส</span>
                        </button>
                    </div>
                    <div id="displayContainerQR" class="hidden flex flex-col items-center justify-center w-full">
                        <div id="qrcode" class="p-3 bg-white rounded-xl shadow-sm inline-block min-w-[200px] min-h-[200px] flex items-center justify-center text-sm text-gray-400">Loading...</div>
                        <p class="mt-4 text-xs text-gray-500 font-medium" data-i18n="scanQR">Scan QR Code</p>
                    </div>
                    <div id="displayContainerBarcode" class="hidden w-full flex flex-col items-center justify-center px-2">
                        <div class="bg-white p-5 rounded-xl shadow-sm w-full flex justify-center overflow-hidden min-h-[140px] items-center text-sm text-gray-400" id="barcodeContainer">
                            <svg id="barcode" class="max-w-full h-auto"></svg>
                        </div>
                        <p class="mt-4 text-xs text-gray-500 font-medium" data-i18n="scanBarcode">Scan Barcode</p>
                    </div>
                </div>
                
                <p class="mt-6 text-xs text-gray-400 text-center px-4 leading-relaxed" data-i18n="scanFallback">หากไม่สามารถสแกนได้ กรุณาใช้รหัสตัวเลขแทน หรือปรับความสว่างหน้าจอให้สูงสุด</p>
                <div class="h-6"></div>
            </div>
        </div>
    </div>

            redeemedAt: new Date().toLocaleDateString('th-TH'),
            couponCode: 'DEMO-CODE-1234',
            termsConditions: '1. คูปองนี้ไม่สามารถแลกเปลี่ยนเป็นเงินสดได้\n2. จำกัดสิทธิ์ 1 บัญชีผู้ใช้ / 1 สิทธิ์\n3. บริษัทขอสงวนสิทธิ์ในการเปลี่ยนแปลงเงื่อนไข',
            usedAt: "2026-05-18T10:19:09.000Z",
            status: "used",        
            codeStatus: "used",    
        };

        function applyTranslations() {
            const t = translations[currentLang];
            if (!t) return;

            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.documentElement.lang = currentLang;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
        }

        function getContrastColor(hexColor) {
            hexColor = hexColor.replace('#', '');
            if (hexColor.length === 3) {
                hexColor = hexColor.split('').map(char => char + char).join('');
            }
            const r = parseInt(hexColor.substr(0, 2), 16);
            const g = parseInt(hexColor.substr(2, 2), 16);
            const b = parseInt(hexColor.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1e293b' : '#ffffff';
        }

        window.addEventListener('message', function(event) {
            
            if (event.data && event.data.type === 'initialData') {
                console.log("XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX");
                const data = event.data.data;
                const appData = window.parent.appData || {}; 
                const htmlCacheVersion = window.parent.htmlCacheVersion || '';

                if (appData.primaryColor) {
                    document.documentElement.style.setProperty('--primary', appData.primaryColor);
                    document.documentElement.style.setProperty('--primary-text', getContrastColor(appData.primaryColor));
                }
                
                if (appData.secondaryColor) {
                    document.documentElement.style.setProperty('--secondary', appData.secondaryColor);
                }

                if (appData.language && translations[appData.language]) {
                    currentLang = appData.language.toLowerCase();
                }

                if (appData.resPath) {
                    currentResPath = appData.resPath;
                    if(appData.customAssets?.rewardHeader) document.getElementById('headerImage').src = appData.customAssets.rewardHeader;
                    else document.getElementById('headerImage').src = `${currentResPath}/header/reward.png?v=${htmlCacheVersion}`;
                }

                applyTranslations();

                rewardData = { ...rewardData, ...data };

                if (typeof rewardData.couponCode === "string") {
                    rewardData.couponCode = rewardData.couponCode.replace(/^#\[\d+\]#/, "");
                }
                
                updateUI();
            }
        }, false);

        function updateUI() {
            const t = translations[currentLang];

            if(rewardData.rewardImage) document.getElementById('rewardImage').src = rewardData.rewardImage;
            document.getElementById('rewardName').textContent = rewardData.rewardName || t.defaultReward;
            document.getElementById('redeemedAt').textContent = rewardData.redeemedAt || '-';
            document.getElementById('rewardDescription').textContent = rewardData.rewardDescription || t.noDetails;
            document.getElementById('termsConditions').textContent = rewardData.termsConditions || t.noTerms;
            document.getElementById('couponCodeText').textContent = rewardData.couponCode || '--------';

            const isUsed = rewardData.status === 'used' || rewardData.codeStatus === 'used';
            
            const usedOverlay = document.getElementById('usedOverlay');
            const actionBtn = document.getElementById('actionBtn');
            const actionBtnText = document.getElementById('actionBtnText');
            const actionBtnIcon = document.getElementById('actionBtnIcon');
            const rewardImage = document.getElementById('rewardImage');

            if (isUsed) {
                usedOverlay.classList.remove('hidden');
                rewardImage.classList.add('opacity-90');

                actionBtn.classList.add('btn-disabled');
                actionBtn.classList.remove('btn-primary', 'active:scale-[0.98]', 'shadow-xl');
                
                actionBtnText.setAttribute('data-i18n', 'couponUsedBtn');
                actionBtnText.textContent = t.couponUsedBtn;
                
                actionBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            } else {
                usedOverlay.classList.add('hidden');
                rewardImage.classList.remove('opacity-90');
                
                actionBtn.classList.remove('btn-disabled');
                actionBtn.classList.add('btn-primary', 'active:scale-[0.98]', 'shadow-xl');
                
                actionBtnText.setAttribute('data-i18n', 'showCouponBtn');
                actionBtnText.textContent = t.showCouponBtn;

                actionBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>';
            }
        }

        function handleActionBtnClick() {
            const isUsed = rewardData.status === 'used' || rewardData.codeStatus === 'used';
            if (!isUsed) {
                openCouponModal();
            }
        }

        function switchTab(tab) {
            const tabDetails = document.getElementById('tabDetails');
            const tabTerms = document.getElementById('tabTerms');
            const contentDetails = document.getElementById('contentDetails');
            const contentTerms = document.getElementById('contentTerms');

            if (tab === 'details') {
                tabDetails.classList.add('tab-active');
                tabDetails.classList.remove('text-gray-400');
                tabTerms.classList.remove('tab-active');
                tabTerms.classList.add('text-gray-400');
                contentDetails.classList.remove('hidden');
                contentTerms.classList.add('hidden');
            } else {
                tabTerms.classList.add('tab-active');
                tabTerms.classList.remove('text-gray-400');
                tabDetails.classList.remove('tab-active');
                tabDetails.classList.add('text-gray-400');
                contentTerms.classList.remove('hidden');
                contentDetails.classList.add('hidden');
            }
        }

        function openCouponModal() {
            document.getElementById('couponModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
            setCouponMode('text');
        }

        function closeCouponModal() {
            document.getElementById('couponModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function setCouponMode(mode) {
            const modeMap = {
                'text': { btn: 'modeText', container: 'displayContainerText' },
                'qr': { btn: 'modeQR', container: 'displayContainerQR' },
                'barcode': { btn: 'modeBarcode', container: 'displayContainerBarcode' }
            };

            Object.values(modeMap).forEach(item => {
                const btn = document.getElementById(item.btn);
                const container = document.getElementById(item.container);
                if (btn) {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                    btn.classList.add('text-gray-500');
                }
                if (container) {
                    container.classList.add('hidden');
                }
            });

            const active = modeMap[mode];
            if (active) {
                const activeBtn = document.getElementById(active.btn);
                const activeContainer = document.getElementById(active.container);
                
                if (activeBtn) {
                    activeBtn.classList.remove('text-gray-500');
                    activeBtn.classList.add('bg-white', 'shadow-sm', 'text-primary');
                }
                if (activeContainer) {
                    activeContainer.classList.remove('hidden');
                }

                if (mode === 'qr' || mode === 'barcode') {
                    setTimeout(() => {
                        if (rewardData.couponCode) generateCodes(mode);
                    }, 50);
                }
            }
        }

        function generateCodes(mode) {
            const code = rewardData.couponCode;
            if (!code) return;
            
            if (mode === 'qr') {
                try {
                    const qrContainer = document.getElementById("qrcode");
                    if (qrContainer && typeof QRCode !== 'undefined') {
                        qrContainer.innerHTML = ""; 
                        new QRCode(qrContainer, {
                            text: code,
                            width: 200,
                            height: 200,
                            colorDark: "#1e293b",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    } else if (qrContainer) {
                        qrContainer.innerHTML = "ไม่สามารถโหลดระบบ QR ได้";
                    }
                } catch (e) { console.error("QR Code Generation Failed", e); }
            }

            if (mode === 'barcode') {
                try {
                    const barcodeElement = document.getElementById("barcode");
                    if (barcodeElement && typeof JsBarcode !== 'undefined') {
                        JsBarcode("#barcode", code, {
                            format: "CODE128",
                            width: 2.5,
                            height: 80,
                            displayValue: true,
                            fontSize: 18,
                            lineColor: "#1e293b",
                            background: "transparent",
                            margin: 5
                        });
                    } else if (document.getElementById("barcodeContainer")) {
                         document.getElementById("barcodeContainer").innerHTML = "ไม่สามารถโหลดระบบ Barcode ได้";
                    }
                } catch (e) { console.error("Barcode Generation Failed", e); }
            }
        }

        function copyToClipboard() {
            const code = rewardData.couponCode;
            if (!code) return;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(code).then(showSuccessToast).catch(fallbackCopyTextToClipboard);
            } else {
                fallbackCopyTextToClipboard(code);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const tempInput = document.createElement("input");
            tempInput.value = text || rewardData.couponCode;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                showSuccessToast();
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(tempInput);
        }

        function showSuccessToast() {
            const t = translations[currentLang];
            showToast(t.copiedSuccess);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] text-sm font-medium transition-all opacity-0';
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            applyTranslations();
            updateUI();
        });

    </script>
</body>
</html>
